<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Matrix // DUAL ENGINE BACKEND EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] p-4 md:p-8 font-mono text-slate-300 min-h-screen">

    <div class="max-w-[1800px] mx-auto w-full">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Omni-Matrix 15</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase font-bold tracking-widest">
                    <span class="animate-blink text-red-500">● LIVE</span> // BACKEND PROXY ENGINE ACTIVE
                </p>
            </div>
            <div class="text-[10px] text-slate-500 italic mt-4 md:mt-0">INTL TRIO + TOPHUB DOMESTIC MATRIX</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 你的万能后端代理！现在它将同时负责海外网站和国内榜眼API的中转
        const MY_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';
        const TOPHUB_API_KEY = '657fc3c8b2782918892872580237c11d'; 

        // 严格按照你的要求：海外只有前三个，后面全是你定制的国内硬核节点
        const platforms = [
            // --- 绝不动摇的海外铁三角 ---
            { id: 'reddit', name: 'Reddit /r/all', color: 'border-orange-500' },
            { id: 'twitter', name: 'X Trend (US)', color: 'border-slate-100' },
            { id: 'imdb', name: 'IMDb Popular', color: 'border-yellow-500' },

            // --- 你的定制国内全矩阵 ---
            { id: 'bilibili', name: 'Bilibili 全站', hashId: '74KvxwokxM', color: 'border-pink-400' },
            { id: 'xiaohongshu', name: '小红书热榜', hashId: 'L4MdA5ldxD', color: 'border-red-600' },
            { id: '3dm', name: '3DM 游戏网', hashId: 'YqoXQR0vOD', color: 'border-orange-600' },
            { id: 'gcores', name: '机核网', hashId: 'wWmoOVYe4E', color: 'border-zinc-500' },
            { id: 'sykong', name: '手游那点事', hashId: 'n3moBXPdN5', color: 'border-teal-500' },
            { id: 'gamersky', name: '游民星空', hashId: 'ARe1kXnv7n', color: 'border-blue-600' },
            { id: 'yys', name: '游研社', hashId: 'Om4ej8mvxE', color: 'border-blue-400' },
            { id: 'gameres', name: 'GameRes游资网', hashId: 'ARe1Lyld7n', color: 'border-indigo-500' },
            { id: 'gouhuo', name: '篝火营地', hashId: 'KGoRRNzol6', color: 'border-yellow-600' },
            { id: 'wechat', name: '微信热文', hashId: 'WnBe01o371', color: 'border-green-500' },
            { id: 'maoyan', name: '猫眼票房榜', hashId: '9JndkpJe3V', color: 'border-red-700' },
            { id: 'sina', name: '新浪热榜', hashId: '4qv9zk1daK', color: 'border-red-500' }
        ];

        async function fetchViaBackend(url) {
            const response = await fetch(MY_PROXY + encodeURIComponent(url), { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }

        async function getRealTimeData(platform) {
            let items = [];
            let raw = '';
            const parser = new DOMParser();

            if (platform.hashId) {
                // ==========================================
                // 【国内节点】：将榜眼 API 丢给 CF Worker 后端去请求
                // ==========================================
                const apiUrl = `https://api.tophub.today/v1/node?hash_id=${platform.hashId}&key=${TOPHUB_API_KEY}`;
                
                // 关键点：由 Worker 代为请求，完美绕过前端跨域限制
                raw = await fetchViaBackend(apiUrl);
                const json = JSON.parse(raw);
                
                if (json && json.data && json.data.items) {
                    json.data.items.slice(0, 15).forEach(item => {
                        items.push({ title: item.title, link: item.url });
                    });
                } else {
                    throw new Error("Invalid Tophub API Payload");
                }
            } else {
                // ==========================================
                // 【海外铁三角】：原封不动，稳如泰山
                // ==========================================
                switch (platform.id) {
                    case 'reddit':
                        raw = await fetchViaBackend('https://www.reddit.com/r/all/hot.json?limit=15');
                        JSON.parse(raw).data.children.slice(0, 15).forEach(c => {
                            items.push({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` });
                        });
                        break;

                    case 'twitter':
                        raw = await fetchViaBackend('https://trends24.in/united-states/');
                        const docTwitter = parser.parseFromString(raw, "text/html");
                        docTwitter.querySelectorAll('.trend-card__list li a').forEach((node, i) => {
                            if(i < 15) items.push({ title: node.textContent.trim(), link: node.href });
                        });
                        break;

                    case 'imdb':
                        raw = await fetchViaBackend('https://api.themoviedb.org/3/trending/movie/day?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb');
                        JSON.parse(raw).results.slice(0, 15).forEach(m => {
                            items.push({ title: m.title, link: `https://www.themoviedb.org/movie/${m.id}` });
                        });
                        break;
                }
            }
            
            if(items.length === 0) throw new Error("Parsed empty array");
            return items;
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            const loadingText = platform.hashId ? `Routing_Backend...` : `Fetching_${platform.name}...`;
            container.innerHTML += `<div id="card-${index}" class="h-[450px] bg-slate-900/50 border-2 border-slate-800 rounded-lg flex items-center justify-center"><span class="text-[9px] animate-pulse uppercase text-emerald-700 font-bold tracking-widest">${loadingText}</span></div>`;

            try {
                const items = await getRealTimeData(platform);
                let html = `
                    <div class="h-[450px] bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-3 bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-800">
                            <span class="font-black text-[10px] uppercase text-white tracking-widest">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block tracking-tight font-sans text-slate-300 transition-colors"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                console.error(`Error on ${platform.id}:`, err);
                const errMsg = platform.hashId ? "API Limit or Key Expired." : "Target WAF block / Endpoint dead.";
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-slate-900 game-border"><span class="text-red-500 font-bold text-[10px] uppercase italic tracking-widest">[SYSTEM OFFLINE]</span><p class="text-[9px] text-slate-600 mt-2 font-mono">${errMsg}</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                loadCard(platforms[i], i); 
            }
        }
        init();
    </script>
</body>
</html>
