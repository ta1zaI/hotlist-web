<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Hot 5 Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes pulse-border { 0% { border-color: rgba(16, 185, 129, 0.2); } 50% { border-color: rgba(16, 185, 129, 0.8); } 100% { border-color: rgba(16, 185, 129, 0.2); } }
        .loading-pulse { animation: pulse-border 2s infinite; }
    </style>
</head>
<body class="bg-slate-950 p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-10 border-b border-slate-800 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase">Global 5 Matrix</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase tracking-widest">Real-time Intelligence Feed</p>
            </div>
            <div class="text-[10px] text-slate-500">PROXY: billowing-salad-1c9b // ACTIVE</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 【保持不动】你的专属代理
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        // 备用节点池：如果一个挂了，自动跳下一个 (避开已知的 530 故障点)
        const NODES = [
            'https://rsshub.rssforever.com',
            'https://hub.slarker.me',
            'https://rss.shab.fun',
            'https://rsshub.anyant.com'
        ];

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', color: 'border-orange-500' },
            { id: 'youtube', name: 'YouTube Trending', type: 'rss', route: '/youtube/trending/en', color: 'border-red-600' },
            { id: 'imdb', name: 'IMDb Movies', type: 'rss', route: '/imdb/trending/movie', color: 'border-yellow-500' },
            { id: 'twitter', name: 'X / Twitter', type: 'rss', route: '/twitter/trends/1', color: 'border-slate-100' },
            { id: 'tiktok', name: 'TikTok Trend', type: 'rss', route: '/tiktok/trending/worldwide', color: 'border-pink-500' }
        ];

        async function fetchWithRetry(platform) {
            // Reddit 走官方直连 JSON
            if (platform.url) {
                const r = await fetch(PROXY + encodeURIComponent(platform.url));
                if (!r.ok) throw new Error('OFFLINE');
                return await r.json();
            }

            // 其余平台尝试轮询所有节点
            for (let node of NODES) {
                try {
                    const r = await fetch(PROXY + encodeURIComponent(node + platform.route));
                    if (r.ok) return await r.text();
                } catch (e) { continue; }
            }
            throw new Error('ALL_NODES_FAILED');
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[550px] bg-slate-900/50 border border-slate-800 rounded-2xl flex items-center justify-center loading-pulse"><span class="text-[10px] animate-pulse">SYNCING ${platform.name}...</span></div>`;

            try {
                const data = await fetchWithRetry(platform);
                let items = [];

                if (platform.type === 'json') {
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else {
                    const doc = new DOMParser().parseFromString(data, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    if (nodes.length === 0) throw new Error('EMPTY');
                    nodes.forEach((n, i) => { if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); });
                }

                let html = `
                    <div class="h-[550px] bg-slate-900 border-t-4 ${platform.color} rounded-2xl flex flex-col overflow-hidden shadow-2xl transition-all hover:scale-[1.02]">
                        <div class="p-4 bg-slate-800/40 flex justify-between items-center border-b border-slate-800">
                            <span class="font-bold text-xs tracking-tighter uppercase text-white">${platform.name}</span>
                            <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        </div>
                        <ul class="p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-3 last:border-0 hover:pl-1 transition-all"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block"> ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="text-center p-6"><span class="text-red-500 font-bold text-xs uppercase">[ERROR]</span><p class="text-[9px] text-slate-500 mt-2">${platform.name} is currently blocked. Try VPN.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); // 错峰抓取，防止并发限流
            }
        }
        init();
    </script>
</body>
</html>
