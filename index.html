<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Intel Matrix // LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Global 5 Hotlist</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase font-bold tracking-widest">
                    <span class="animate-blink text-red-500">● LIVE</span> // SECURE MULTI-PROXY ENABLED
                </p>
            </div>
            <div class="text-[10px] text-slate-500 italic mt-4 md:mt-0">REAL-TIME SYNC ACTIVE</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 【核心防御】双重代理层：自己的 CF 挂了，自动用备用公共代理顶上
        const PROXIES = [
            'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=',
            'https://api.allorigins.win/raw?url=' 
        ];

        // 镜像池
        const MIRRORS = [
            'https://rsshub.rssforever.com',
            'https://hub.slarker.me',
            'https://rss.shab.fun',
            'https://rsshub.liubing.me'
        ];

        // 平台配置（锁死你需要的 5 个外网核心）
        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', color: 'border-orange-500' },
            { id: 'youtube', name: 'YouTube Trend (US)', type: 'json-yt', url: 'https://yt.lemnoslife.com/trending', color: 'border-red-600' },
            { id: 'imdb', name: 'IMDb Popular', type: 'xml', route: '/imdb/trending/movie', color: 'border-yellow-500' },
            { id: 'twitter', name: 'X Trend (US)', type: 'xml', route: '/twitter/trends/23424977', color: 'border-slate-100' },
            { id: 'tiktok', name: 'TikTok Trend', type: 'xml', route: '/tiktok/trending/worldwide', color: 'border-pink-500' }
        ];

        // 究极轮询引擎：尝试不同节点 + 尝试不同代理
        async function fetchWithResilience(platform) {
            let targetUrls = platform.url ? [platform.url] : MIRRORS.map(m => m + platform.route);

            for (let targetUrl of targetUrls) {
                for (let proxy of PROXIES) {
                    try {
                        const fetchUrl = proxy + encodeURIComponent(targetUrl);
                        // { cache: 'no-store' } 保证每次拿到最新数据，且不破坏 URL 路由结构
                        const response = await fetch(fetchUrl, { cache: 'no-store' });
                        
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        
                        let data = platform.type.includes('json') ? await response.json() : await response.text();
                        
                        // 确保拿到的是真实的 XML 而不是代理报错网页
                        if (platform.type === 'xml' && !data.includes('<item')) throw new Error('Invalid XML');
                        
                        return data;
                    } catch (e) {
                        console.warn(`[Proxy/Node Failed] ${targetUrl} via ${proxy}`);
                        continue; // 当前组合失败，尝试下一种组合
                    }
                }
            }
            throw new Error('All combinations exhausted');
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[500px] bg-slate-900/50 border-2 border-slate-800 rounded-lg flex items-center justify-center"><span class="text-[9px] animate-pulse uppercase text-slate-500 tracking-tighter font-bold">Connecting_${platform.name}...</span></div>`;

            try {
                const data = await fetchWithResilience(platform);
                let items = [];

                if (platform.type === 'json') {
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else if (platform.type === 'json-yt') {
                    // 专门处理 YouTube 原生接口
                    items = data.items.map(v => ({ title: v.snippet.title, link: `https://www.youtube.com/watch?v=${v.id}` }));
                } else {
                    const doc = new DOMParser().parseFromString(data, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    nodes.forEach((n, i) => { 
                        if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); 
                    });
                }

                if (items.length === 0) throw new Error('Empty Data');

                let html = `
                    <div class="h-[500px] bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-3 bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-800">
                            <span class="font-black text-[10px] uppercase text-white">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.slice(0, 15).forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-[11px] leading-tight hover:text-emerald-400 block tracking-tight font-sans text-slate-300 transition-colors"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-slate-900 game-border"><span class="text-red-500 font-bold text-[10px] uppercase italic tracking-widest">[SYNC FAILED]</span><p class="text-[9px] text-slate-600 mt-2">All routes & proxies blocked.</p></div>`;
            }
        }

        async function init() {
            // 依然保持错峰请求，避免瞬间高并发触发风控
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 300)); 
            }
        }
        init();
    </script>
</body>
</html>
