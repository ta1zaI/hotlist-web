<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Intel Matrix // LIVE FEED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Global 5 Hotlist</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase font-bold tracking-widest">
                    <span class="animate-blink text-red-500">● LIVE</span> // HYBRID SCRAPING ENGINE
                </p>
            </div>
            <div class="text-[10px] text-slate-500 italic mt-4 md:mt-0">PROXY: BILLOWING-SALAD (ACTIVE)</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        const MY_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', color: 'border-orange-500' },
            { id: 'twitter', name: 'X Trend (US)', color: 'border-slate-100' },
            { id: 'youtube', name: 'YouTube Trend', color: 'border-red-600' },
            { id: 'imdb', name: 'IMDb Popular', color: 'border-yellow-500' },
            { id: 'tiktok', name: 'TikTok Trend', color: 'border-pink-500' }
        ];

        // 基础抓取
        async function fetchRawData(url, useTimestamp = false) {
            let targetUrl = url;
            if (useTimestamp) {
                targetUrl += (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
            }
            const response = await fetch(MY_PROXY + encodeURIComponent(targetUrl), { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }

        // 镜像轮询引擎：专治 403 和 503
        async function fetchWithMirrors(routes) {
            for (let route of routes) {
                try {
                    const response = await fetch(MY_PROXY + encodeURIComponent(route), { cache: 'no-store' });
                    if (response.ok) return await response.text();
                } catch (e) {
                    console.warn(`Node failed: ${route}, switching...`);
                    continue;
                }
            }
            throw new Error("All mirror nodes failed");
        }

        async function getRealTimeData(platformId) {
            let items = [];
            let raw = '';
            const parser = new DOMParser();

            switch (platformId) {
                case 'reddit':
                    // 【已成功：保留】
                    raw = await fetchRawData('https://www.reddit.com/r/all/hot.json?limit=15', true);
                    JSON.parse(raw).data.children.slice(0, 15).forEach(c => {
                        items.push({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` });
                    });
                    break;

                case 'twitter':
                    // 【已成功：保留】
                    raw = await fetchRawData('https://trends24.in/united-states/', true);
                    const docTwitter = parser.parseFromString(raw, "text/html");
                    const tNodes = docTwitter.querySelectorAll('.trend-card__list li a');
                    for(let i=0; i<Math.min(tNodes.length, 15); i++) {
                        items.push({ title: tNodes[i].textContent.trim(), link: tNodes[i].href });
                    }
                    break;

                case 'youtube':
                    // 【修复：镜像轮询】找存活的 RSSHub 节点拿 YouTube US 热门
                    raw = await fetchWithMirrors([
                        'https://rsshub.rssforever.com/youtube/trending/US',
                        'https://hub.slarker.me/youtube/trending/US',
                        'https://rsshub.app/youtube/trending/US'
                    ]);
                    const docYt = parser.parseFromString(raw, "text/xml");
                    docYt.querySelectorAll("item").forEach((n, i) => { 
                        if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); 
                    });
                    break;

                case 'imdb':
                    // 【修复：镜像轮询】找存活的 RSSHub 节点拿 IMDb 热门
                    raw = await fetchWithMirrors([
                        'https://rsshub.app/imdb/trending/movie',
                        'https://rsshub.rssforever.com/imdb/trending/movie',
                        'https://hub.slarker.me/imdb/trending/movie'
                    ]);
                    const docImdb = parser.parseFromString(raw, "text/xml");
                    docImdb.querySelectorAll("item").forEach((n, i) => { 
                        if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); 
                    });
                    break;

                case 'tiktok':
                    // 【终极绕道：基因重组】直接抓 50 个热门视频，强行提取它们的 hashtag！
                    raw = await fetchRawData('https://www.tikwm.com/api/feed/list?region=US&count=50', false);
                    const vList = JSON.parse(raw).data;
                    let tagCounts = {};
                    
                    // 扫描所有视频标题，找出带 # 的话题
                    vList.forEach(v => {
                        if (v.title) {
                            let matches = v.title.match(/#([a-zA-Z0-9_]+)/g);
                            if (matches) {
                                matches.forEach(m => {
                                    let tag = m.toLowerCase();
                                    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
                                });
                            }
                        }
                    });

                    // 按出现频率排序
                    let sortedTags = Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]);

                    if (sortedTags.length === 0) throw new Error("No hashtags extracted");

                    // 截取前 15 个最热门的话题，拼装成官方话题页链接
                    sortedTags.slice(0, 15).forEach(tag => {
                        items.push({ 
                            title: tag, 
                            link: `https://www.tiktok.com/tag/${encodeURIComponent(tag.replace('#', ''))}` 
                        });
                    });
                    break;
            }
            
            if(items.length === 0) throw new Error("Empty Data Parsed");
            return items;
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[500px] bg-slate-900/50 border-2 border-slate-800 rounded-lg flex items-center justify-center"><span class="text-[9px] animate-pulse uppercase text-emerald-700 font-bold tracking-widest">Scraping_${platform.name}...</span></div>`;

            try {
                const items = await getRealTimeData(platform.id);
                let html = `
                    <div class="h-[500px] bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-3 bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-800">
                            <span class="font-black text-[10px] uppercase text-white tracking-widest">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block tracking-tight font-sans text-slate-300 transition-colors"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                console.error(`Error on ${platform.id}:`, err);
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-slate-900 game-border"><span class="text-red-500 font-bold text-[10px] uppercase italic tracking-widest">[SCRAPE FAILED]</span><p class="text-[9px] text-slate-600 mt-2">Target structure mutated or blocked.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); 
            }
        }
        init();
    </script>
</body>
</html>
