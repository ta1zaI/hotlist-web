<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL 5 MATRIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(34, 197, 94, 0.2); animation: scan 3s linear infinite; }
    </style>
</head>
<body class="bg-slate-950 p-4 md:p-8 font-mono text-emerald-500">

    <div class="max-w-[1600px] mx-auto relative">
        <div class="scan-line"></div>
        <header class="mb-10 border-b border-emerald-900/50 pb-6">
            <h1 class="text-3xl font-black tracking-[0.2em] uppercase">Global Intel Matrix</h1>
            <p class="text-[10px] text-emerald-700 mt-2 italic">Status: System Online // Data Encrypted</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 【已填入】你的专属代理
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        const platforms = [
            { name: 'Reddit/r/all', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', color: 'border-orange-500' },
            { name: 'IMDb Trending', type: 'rss', url: 'https://rsshub.rssforever.com/imdb/trending/movie', color: 'border-yellow-500' },
            { name: 'X/Twitter', type: 'rss', url: 'https://hub.slarker.me/twitter/trends/1', color: 'border-slate-100' },
            { name: 'TikTok Trend', type: 'rss', url: 'https://rss.shab.fun/tiktok/trending/worldwide', color: 'border-pink-500' },
            { name: 'YouTube Hot', type: 'rss', url: 'https://rsshub.anyant.com/youtube/trending/en', color: 'border-red-600' }
        ];

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[550px] bg-slate-900/30 border border-emerald-900/30 p-6 flex items-center justify-center"><span class="animate-pulse text-xs tracking-widest">>> FETCHING ${platform.name}...</span></div>`;

            try {
                // 强制通过你的 CF 代理
                const fetchUrl = PROXY + encodeURIComponent(platform.url);
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error('CONNECTION_LOST');
                
                let items = [];
                if (platform.type === 'json') {
                    const data = await response.json();
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else {
                    const text = await response.text();
                    const doc = new DOMParser().parseFromString(text, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    if (nodes.length === 0) throw new Error('EMPTY_DATA');
                    nodes.forEach((n, i) => { if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); });
                }

                let html = `
                    <div class="h-[550px] bg-slate-900/80 border-t-2 ${platform.color} flex flex-col overflow-hidden shadow-2xl">
                        <div class="p-4 bg-slate-800/50 flex justify-between items-center">
                            <span class="font-bold text-[10px] tracking-tighter uppercase">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                        </div>
                        <ul class="p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar text-[11px] leading-relaxed">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-emerald-900/20 pb-2 hover:bg-emerald-950/20 transition-all"><a href="${item.link}" target="_blank" class="hover:text-white block"> ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;

            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="text-center p-4"><span class="text-red-500 font-bold text-xs uppercase">[ACCESS_DENIED]</span><p class="text-[9px] text-slate-600 mt-2">${platform.name} Node Offline</p></div>`;
            }
        }

        async function init() {
            // 采用“一个一个来”的加载策略，绝不给服务器压力
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 500)); 
            }
        }
        init();
    </script>
</body>
</html>
