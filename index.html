<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Intelligence - 全球情报站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-black p-4 md:p-8 font-sans text-slate-300">

    <div class="max-w-[1500px] mx-auto">
        <header class="flex flex-col items-center mb-12">
            <h1 class="text-4xl font-black italic tracking-tighter text-white bg-gradient-to-r from-blue-500 to-emerald-500 bg-clip-text text-transparent">GLOBAL 5 MATRIX</h1>
            <div class="h-1 w-24 bg-emerald-500 mt-2"></div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 【已填入】你的专属穿透节点
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        // 备选节点池（分布式采集，防止单点被封）
        const NODES = [
            'https://rsshub.rssforever.com',
            'https://hub.slarker.me',
            'https://rss.shab.fun',
            'https://rsshub.anyant.com'
        ];

        const platforms = [
            { name: 'Reddit (All)', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', color: 'border-orange-500' },
            { name: 'YouTube Trending', type: 'rss', route: '/youtube/trending/cn', color: 'border-red-600' },
            { name: 'IMDb Trending', type: 'rss', route: '/imdb/trending/movie', color: 'border-yellow-500' },
            { name: 'Twitter (X)', type: 'rss', route: '/twitter/trends/1', color: 'border-slate-400' },
            { name: 'TikTok Hot', type: 'rss', route: '/tiktok/trending/worldwide', color: 'border-pink-500' }
        ];

        async function fetchWithRetry(platform) {
            // Reddit 走官方 JSON
            if (platform.type === 'json') {
                return await fetch(PROXY + encodeURIComponent(platform.url)).then(r => r.json());
            }

            // 其他 RSS 平台进行多节点轮询
            for (let node of NODES) {
                try {
                    const response = await fetch(PROXY + encodeURIComponent(node + platform.route));
                    if (response.ok) return await response.text();
                } catch (e) { continue; }
            }
            throw new Error('All nodes failed');
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[550px] bg-slate-900/50 rounded-2xl border ${platform.color} border-opacity-30 p-6 flex flex-col items-center justify-center animate-pulse"><span class="text-xs">Connecting to ${platform.name}...</span></div>`;

            try {
                const data = await fetchWithRetry(platform);
                let items = [];

                if (platform.type === 'json') {
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else {
                    const doc = new DOMParser().parseFromString(data, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    nodes.forEach((n, i) => { if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); });
                }

                let html = `
                    <div class="h-[550px] bg-slate-900 border ${platform.color} rounded-2xl flex flex-col overflow-hidden animate-slide shadow-2xl shadow-emerald-500/5">
                        <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                            <span class="font-bold text-sm tracking-widest uppercase">${platform.name}</span>
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></div>
                        </div>
                        <ul class="p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar text-xs">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-3 last:border-0 hover:translate-x-1 transition-transform"><a href="${item.link}" target="_blank" class="hover:text-emerald-400 leading-relaxed block">${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<span class="text-red-500 font-bold text-xs uppercase">${platform.name} Offline</span><p class="text-[10px] mt-2 opacity-50 text-center">Firewall blocked all access points.</p>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); // 错峰抓取，防止触发并发拦截
            }
        }

        init();
    </script>
</body>
</html>
