<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬核玩家全网矩阵 - 终极防御版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans text-gray-800">

    <div class="max-w-[1600px] mx-auto">
        <h1 class="text-3xl font-extrabold text-center mb-8 tracking-tighter">🎮 全网硬核资讯矩阵</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="board-container"></div>
    </div>

    <script>
        // 【保持不变】你的专属代理
        const MY_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        // 备用节点池：如果一个挂了，自动跳下一个
        const NODES = [
            'https://rsshub.app',
            'https://rsshub.rssforever.com',
            'https://hub.slarker.me',
            'https://rss.shab.fun'
        ];

        const platforms = [
            { id: 'reddit', name: 'Reddit (Gaming)', type: 'json', url: 'https://www.reddit.com/r/gaming/hot.json', color: 'bg-orange-600' },
            { id: 'gamersky', name: '游民星空', route: '/gamersky/news', color: 'bg-yellow-600' },
            { id: 'bili', name: 'B站热门', route: '/bilibili/v/popular/all', color: 'bg-blue-500' },
            { id: 'weibo', name: '微博热搜', route: '/weibo/search/hot', color: 'bg-red-500' },
            { id: '3dm', name: '3DM游戏网', route: '/3dm/news', color: 'bg-green-600' },
            { id: 'gcores', name: '机核网', route: '/gcores/category/news', color: 'bg-zinc-800' },
            { id: 'taptap', name: 'TapTap热门', route: '/taptap/topic/hot', color: 'bg-teal-500' },
            { id: 'yystv', name: '游研社', route: '/yystv/docs', color: 'bg-indigo-600' },
            { id: 'youtube', name: 'YouTube热门', route: '/youtube/trending', color: 'bg-red-600' },
            { id: 'douyin', name: '抖音热点', route: '/douyin/hot', color: 'bg-black' },
            { id: 'twitter', name: 'Twitter趋势', route: '/twitter/trends/23424977', color: 'bg-sky-500' },
            { id: 'shouyou', name: '手游那点事', route: '/zhihu/people/shou-you-na-dian-shi/activities', color: 'bg-blue-700' }
        ];

        async function loadCard(platform, index, nodeIndex = 0) {
            const card = document.getElementById(`card-${index}`);
            card.innerHTML = `<div class="flex items-center justify-center h-full"><span class="text-sm animate-pulse text-gray-400">正在通过线路 ${nodeIndex + 1} 抓取...</span></div>`;

            try {
                // 自动选择节点
                const baseUrl = platform.url || (NODES[nodeIndex] + platform.route);
                const fetchUrl = MY_PROXY + encodeURIComponent(baseUrl);
                
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                let items = [];
                if (platform.type === 'json') {
                    const data = await response.json();
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else {
                    const text = await response.text();
                    const doc = new DOMParser().parseFromString(text, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    if (nodes.length === 0) throw new Error('解析为空');
                    nodes.forEach((n, i) => { if(i < 12) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); });
                }

                let html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-full animate-fade-in">
                        <div class="p-3 ${platform.color} text-white font-bold flex justify-between items-center rounded-t-xl">
                            <span>${platform.name}</span>
                            <button onclick="retryCard(${index})" class="text-xs bg-white/20 hover:bg-white/40 px-2 py-1 rounded">刷新</button>
                        </div>
                        <ul class="p-3 space-y-2 overflow-y-auto flex-1">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-gray-50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-xs text-gray-700 hover:text-blue-600 line-clamp-2">${item.title}</a></li>`;
                });
                html += `</ul></div>`;
                card.innerHTML = html;

            } catch (err) {
                // 如果当前节点失败，且还有备用节点，自动切换下一个
                if (!platform.url && nodeIndex < NODES.length - 1) {
                    loadCard(platform, index, nodeIndex + 1);
                } else {
                    card.innerHTML = `
                        <div class="bg-white rounded-xl border border-red-100 h-full flex flex-col items-center justify-center p-4">
                            <span class="text-red-400 font-bold mb-2">🚫 ${platform.name}</span>
                            <p class="text-[10px] text-gray-400 text-center mb-3">所有线路均被封锁或超时</p>
                            <button onclick="retryCard(${index})" class="text-xs text-blue-500 border border-blue-200 px-4 py-1 rounded-full hover:bg-blue-50">尝试重连</button>
                        </div>`;
                }
            }
        }

        function retryCard(index) {
            loadCard(platforms[index], index, 0);
        }

        // 初始化
        const container = document.getElementById('board-container');
        platforms.forEach((p, i) => {
            container.innerHTML += `<div id="card-${i}" class="h-[400px]"></div>`;
            setTimeout(() => loadCard(p, i), i * 300); // 错开加载，防止并发太高
        });
    </script>
</body>
</html>
