<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Matrix v5.0 - Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 0px; }
        body { background-color: #f4f4f0; background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px; }
        
        /* 欧美潮酷硬核 UI 风格 */
        .neo-brutal {
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.2s ease;
        }
        .neo-brutal:hover {
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0px #000;
        }
        .neo-title { text-shadow: 3px 3px 0px #000; }
        .marquee-container { overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body class="p-4 md:p-6 font-sans text-black">

    <div class="max-w-[1800px] mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-end border-b-4 border-black pb-4">
            <div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase italic text-white neo-title" style="-webkit-text-stroke: 2px black;">OMNI-MATRIX 14</h1>
                <p class="text-xs font-bold mt-2 uppercase tracking-widest bg-yellow-300 inline-block px-2 border-2 border-black">Active Node: Billowing-Salad // Status: Omni-Link</p>
            </div>
            <div class="text-xs font-bold mt-4 md:mt-0 px-3 py-1 bg-[#00ffcc] border-2 border-black">SYNC: 100% SECURE</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        const platforms = [
            // 全球五大 (最稳的直连与大厂抓取)
            { id: 'reddit', name: 'Reddit /r/all', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', bg: 'bg-[#ff4500]', text: 'text-white' },
            { id: 'youtube', name: 'YouTube Trend', type: 'rss-google', url: 'https://news.google.com/rss/search?q=YouTube+Trending+Videos&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#ff0000]', text: 'text-white' },
            { id: 'imdb', name: 'IMDb Movies', type: 'rss-google', url: 'https://news.google.com/rss/search?q=IMDb+Top+Movies&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#f5c518]', text: 'text-black' },
            { id: 'twitter', name: 'X / Twitter', type: 'rss-google', url: 'https://news.google.com/rss/search?q=Twitter+Trending+Topics&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#1da1f2]', text: 'text-white' },
            { id: 'tiktok', name: 'TikTok Trend', type: 'rss-google', url: 'https://news.google.com/rss/search?q=TikTok+Trending+Challenges&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#00f2fe]', text: 'text-black' },
            
            // 国内大众热搜 (走 vvhan 官方稳定 API)
            { id: 'bilibili', name: 'Bilibili 热门', type: 'hot', url: 'https://api.vvhan.com/api/hotlist/bili', bg: 'bg-[#fb7299]', text: 'text-white' },
            { id: 'weibo', name: '微博热搜', type: 'hot', url: 'https://api.vvhan.com/api/hotlist/wbHot', bg: 'bg-[#ffcc00]', text: 'text-black' },
            { id: 'douyin', name: '抖音热点', type: 'hot', url: 'https://api.vvhan.com/api/hotlist/douyin', bg: 'bg-[#1c1c1e]', text: 'text-white' },

            // 硬核游戏圈 (双重代理：RSS2JSON + Cloudflare)
            { id: 'gamersky', name: '游民星空', type: 'rss-game', url: 'https://rsshub.app/gamersky/news', bg: 'bg-[#ff5500]', text: 'text-white' },
            { id: '3dm', name: '3DM游戏网', type: 'rss-game', url: 'https://rsshub.app/3dm/news', bg: 'bg-[#1abc9c]', text: 'text-white' },
            { id: 'taptap', name: 'TapTap 热榜', type: 'rss-game', url: 'https://rsshub.app/taptap/topic/hot', bg: 'bg-[#00d085]', text: 'text-white' },
            { id: 'yystv', name: '游研社', type: 'rss-game', url: 'https://rsshub.app/yystv/docs', bg: 'bg-[#e74c3c]', text: 'text-white' },
            { id: 'gcores', name: '机核 Gcores', type: 'rss-game', url: 'https://rsshub.app/gcores/category/news', bg: 'bg-[#2c3e50]', text: 'text-white' },
            { id: 'shouyou', name: '手游那点事', type: 'rss-game', url: 'https://rsshub.app/zhihu/people/shou-you-na-dian-shi/activities', bg: 'bg-[#3498db]', text: 'text-white' }
        ];

        async function fetchAPI(platform) {
            let fetchUrl = PROXY + encodeURIComponent(platform.url);
            
            // 对于游戏站 RSS，我们套一层 rss2json 彻底解决跨域和 530 错误
            if (platform.type === 'rss-game') {
                fetchUrl = PROXY + encodeURIComponent(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(platform.url)}`);
            }

            const response = await fetch(fetchUrl);
            if (!response.ok) throw new Error('Network Error');

            if (platform.type === 'json') {
                const data = await response.json();
                return data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
            } 
            else if (platform.type === 'hot') {
                const data = await response.json();
                return data.data.map(i => ({ title: i.title, link: i.url }));
            } 
            else if (platform.type === 'rss-game') {
                const data = await response.json();
                if(data.status !== 'ok') throw new Error('Parse Failed');
                return data.items.map(i => ({ title: i.title, link: i.link }));
            } 
            else {
                // rss-google
                const text = await response.text();
                const doc = new DOMParser().parseFromString(text, "text/xml");
                const nodes = doc.querySelectorAll("item");
                let items = [];
                nodes.forEach((n, i) => { 
                    if(i < 15) {
                        let cleanTitle = n.querySelector("title")?.textContent.replace(/ - [^-]+$/, '') || 'No Title';
                        items.push({ title: cleanTitle, link: n.querySelector("link")?.textContent });
                    }
                });
                return items;
            }
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[480px] bg-white neo-brutal flex items-center justify-center"><span class="font-bold uppercase animate-pulse">Loading ${platform.name}...</span></div>`;

            try {
                const items = await fetchAPI(platform);
                let html = `
                    <div class="h-[480px] bg-white neo-brutal flex flex-col overflow-hidden">
                        <div class="p-3 ${platform.bg} border-b-4 border-black flex justify-between items-center">
                            <span class="font-black text-lg uppercase ${platform.text} tracking-tight">${platform.name}</span>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar bg-white">
                `;
                items.forEach(item => {
                    html += `<li class="border-b-2 border-gray-100 pb-2 last:border-0 hover:translate-x-1 transition-transform"><a href="${item.link}" target="_blank" class="text-xs font-bold text-gray-800 hover:text-blue-700 block leading-relaxed line-clamp-2"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-white neo-brutal"><span class="text-red-500 font-black text-xl uppercase">OFFLINE</span><p class="text-xs font-bold mt-2 text-gray-500">${platform.name} Data Blocked</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 150)); 
            }
        }
        init();
    </script>
</body>
</html>
