<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网硬核玩家资讯矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans">

    <div class="max-w-[1600px] mx-auto">
        <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-8 tracking-wide">
            🎮 硬核玩家全网矩阵
        </h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="board-container">
            </div>
    </div>

    <script>
        // 【保持不变】你的专属 Cloudflare 代理
        const MY_CF_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        // 分流节点，提高存活率
        const NODE_A = 'https://rsshub.app';           // 官方节点（代理后可用性极高）
        const NODE_B = 'https://rsshub.rssforever.com'; // 稳健节点B
        const NODE_C = 'https://hub.slarker.me';        // 稳健节点C

        const platforms = [
            { name: 'Reddit (Gaming)', type: 'json', url: 'https://www.reddit.com/r/gaming/hot.json', color: 'bg-orange-50 text-orange-600 border-orange-200' },
            { name: '游民星空', type: 'xml', url: `${NODE_A}/gamersky/news`, color: 'bg-yellow-50 text-yellow-700 border-yellow-200' },
            { name: '微博热搜', type: 'xml', url: `${NODE_B}/weibo/search/hot`, color: 'bg-red-50 text-red-600 border-red-200' },
            { name: 'B站热门', type: 'xml', url: `${NODE_C}/bilibili/v/popular/all`, color: 'bg-blue-50 text-blue-600 border-blue-200' },
            { name: '抖音热点', type: 'xml', url: `${NODE_B}/douyin/hot`, color: 'bg-zinc-800 text-white border-zinc-700' },
            { name: '3DM 游戏网', type: 'xml', url: `${NODE_A}/3dm/news`, color: 'bg-green-50 text-green-600 border-green-200' },
            { name: 'TapTap 热门', type: 'xml', url: `${NODE_B}/taptap/topic/hot`, color: 'bg-teal-50 text-teal-600 border-teal-200' },
            { name: '游研社', type: 'xml', url: `${NODE_C}/yystv/docs`, color: 'bg-indigo-50 text-indigo-600 border-indigo-200' },
            { name: '机核网 Gcores', type: 'xml', url: `${NODE_A}/gcores/category/news`, color: 'bg-zinc-900 text-white border-zinc-700' },
            { name: 'YouTube 热门', type: 'xml', url: `${NODE_A}/youtube/trending`, color: 'bg-red-50 text-red-700 border-red-200' },
            { name: 'Twitter 趋势', type: 'xml', url: `${NODE_B}/twitter/trends/23424977`, color: 'bg-sky-50 text-sky-500 border-sky-200' },
            { name: '手游那点事', type: 'xml', url: `${NODE_A}/zhihu/people/shou-you-na-dian-shi/activities`, color: 'bg-blue-50 text-blue-800 border-blue-200' }
        ];

        async function fetchAPI(platform) {
            try {
                const fetchUrl = MY_CF_PROXY + encodeURIComponent(platform.url);
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error(`源站繁忙 (${response.status})`);
                
                let items = [];
                if (platform.type === 'json') {
                    const data = await response.json();
                    items = data.data.children.map(child => ({
                        title: child.data.title,
                        link: `https://www.reddit.com${child.data.permalink}`
                    }));
                } else {
                    const text = await response.text();
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(text, "text/xml");
                    const nodes = xmlDoc.querySelectorAll("item");
                    if (nodes.length === 0) throw new Error('解析不到内容');
                    for (let i = 0; i < Math.min(nodes.length, 12); i++) {
                        items.push({
                            title: nodes[i].querySelector("title")?.textContent || '无标题',
                            link: nodes[i].querySelector("link")?.textContent || '#'
                        });
                    }
                }

                let html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[400px] animate-fade-in">
                        <h2 class="text-md font-bold p-3 border-b ${platform.color}">${platform.name}</h2>
                        <ul class="p-3 space-y-2 overflow-y-auto flex-1">
                `;
                for (let i = 0; i < items.length; i++) {
                    html += `
                        <li class="flex items-start border-b border-gray-50 pb-2 last:border-0">
                            <span class="font-bold text-gray-400 w-5 shrink-0 text-sm">${i+1}.</span>
                            <a href="${items[i].link}" target="_blank" class="text-gray-700 hover:text-blue-600 hover:underline transition-colors line-clamp-2 text-xs leading-tight flex-1">
                                ${items[i].title}
                            </a>
                        </li>
                    `;
                }
                html += `</ul></div>`;
                return html;
            } catch (error) {
                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 h-[400px] flex flex-col items-center justify-center animate-fade-in">
                        <span class="text-red-400 font-bold text-center mb-2 text-sm">🚫 ${platform.name}</span>
                        <span class="text-gray-400 text-xs text-center">源站繁忙，请尝试刷新</span>
                    </div>
                `;
            }
        }

        async function init() {
            const container = document.getElementById('board-container');
            for (let i = 0; i < platforms.length; i++) {
                container.innerHTML += `<div id="card-${i}" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 h-[400px] flex flex-col items-center justify-center"><span class="text-blue-400 font-bold mb-2 animate-pulse text-sm">🌐 通道连接：${platforms[i].name}...</span></div>`;
            }
            // 瀑布流加载，间隔 200ms
            for (let i = 0; i < platforms.length; i++) {
                const html = await fetchAPI(platforms[i]);
                document.getElementById(`card-${i}`).outerHTML = html;
                await new Promise(r => setTimeout(r, 200)); 
            }
        }

        init();
    </script>
</body>
</html>
