<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GLOBAL 5 MATRIX - Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes scan { 0% { border-color: rgba(16, 185, 129, 0.2); } 50% { border-color: rgba(16, 185, 129, 0.8); } 100% { border-color: rgba(16, 185, 129, 0.2); } }
        .border-pulse { animation: scan 2s infinite; }
    </style>
</head>
<body class="bg-[#050505] p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-10 border-b border-slate-800 pb-6 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-white uppercase italic">Global 5 Intelligence</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase tracking-widest font-bold font-mono">Secure Feed // Node: Billowing-Salad-1C9B</p>
            </div>
            <div class="text-[10px] text-slate-500 uppercase">Resilience Mode: Multi-Source Alpha</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', type: 'json', sources: ['https://www.reddit.com/r/all/hot.json'], color: 'border-orange-500' },
            { id: 'youtube', name: 'YouTube Trending', type: 'json', sources: ['https://inv.tux.rs/api/v1/trending', 'https://invidious.snopyta.org/api/v1/trending'], color: 'border-red-600' },
            { id: 'imdb', name: 'IMDb Popular', type: 'rss', sources: ['https://rss.app/feeds/v1/2P9T7S7jJ8Y9jK8L.xml', 'https://www.imdb.com/list/ls016522954/rss'], color: 'border-yellow-500' },
            { id: 'twitter', name: 'X / Twitter', type: 'json', sources: ['https://api.oick.cn/api/twitter', 'https://api.btstu.cn/sianhot/api.php?type=twitter'], color: 'border-slate-100' },
            { id: 'tiktok', name: 'TikTok Trend', type: 'json', sources: ['https://api.oick.cn/api/douyin', 'https://api.btstu.cn/sianhot/api.php?type=douyin'], color: 'border-pink-500' }
        ];

        async function fetchWithRetry(platform, sourceIndex = 0) {
            const url = platform.sources[sourceIndex];
            try {
                const response = await fetch(PROXY + encodeURIComponent(url));
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                if (platform.type === 'json' || platform.type === 'invidious') return await response.json();
                return await response.text();
            } catch (e) {
                if (sourceIndex < platform.sources.length - 1) {
                    console.warn(`Source ${sourceIndex} failed for ${platform.name}, retrying...`);
                    return await fetchWithRetry(platform, sourceIndex + 1);
                }
                throw e;
            }
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[550px] bg-slate-900/50 border border-slate-800 rounded-2xl flex items-center justify-center border-pulse"><span class="text-[9px] animate-pulse text-emerald-800 font-bold uppercase">Syncing_${platform.name}...</span></div>`;

            try {
                const data = await fetchWithRetry(platform);
                let items = [];

                if (platform.id === 'reddit') {
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else if (platform.id === 'youtube') {
                    items = data.map(v => ({ title: v.title, link: `https://www.youtube.com/watch?v=${v.videoId}` }));
                } else if (platform.type === 'json') {
                    // 通用热榜接口解析
                    const list = data.data || data;
                    items = list.map(i => ({ title: i.title || i.name, link: i.url || i.link || '#' }));
                } else {
                    const doc = new DOMParser().parseFromString(data, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    nodes.forEach((n, i) => { if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); });
                }

                let html = `
                    <div class="h-[550px] bg-slate-900 border-t-4 ${platform.color} rounded-2xl flex flex-col overflow-hidden shadow-2xl hover:scale-[1.01] transition-all">
                        <div class="p-4 bg-slate-800/40 flex justify-between items-center border-b border-slate-800">
                            <span class="font-black text-xs uppercase text-white tracking-widest font-mono">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981]"></div>
                        </div>
                        <ul class="p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-3 last:border-0 hover:pl-1 transition-all"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block tracking-tight font-sans"> ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="text-center p-6"><span class="text-red-500 font-bold text-[10px] uppercase italic font-mono">[ACCESS_DENIED]</span><p class="text-[9px] text-slate-600 mt-2 font-mono">Source nodes unreachable. Check VPN.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); 
            }
        }
        init();
    </script>
</body>
</html>
