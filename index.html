<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球热榜聚合站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .font-smooth-rounded {
            font-family: system-ui, -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .game-border { border: 2px solid #cbd5e1; box-shadow: 4px 4px 0px #94a3b8; transition: all 0.3s; }
        .dark .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-800 dark:text-slate-300 font-mono transition-colors duration-300 min-h-screen p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto w-full">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-300 dark:border-slate-800 pb-4">
            <div>
                <h1 class="text-4xl font-black tracking-wide text-slate-900 dark:text-white uppercase font-smooth-rounded">全球热榜聚合站</h1>
                <div class="flex items-center gap-4 mt-3">
                    <p class="text-sm text-emerald-600 dark:text-emerald-500 uppercase font-bold tracking-widest font-smooth-rounded">
                        <span class="animate-blink text-red-500">● LIVE</span> // CLOUDFLARE ROUTING ACTIVE 
                    </p>
                    <span class="text-sm font-bold text-slate-600 dark:text-slate-400 bg-slate-200 dark:bg-slate-800 px-3 py-1 rounded shadow-inner font-smooth-rounded" id="last-refresh">上次刷新: 获取中...</span>
                </div>
            </div>
            
            <div class="text-sm font-bold mt-6 md:mt-0 flex flex-wrap items-center gap-3 font-smooth-rounded">
                <button id="translate-btn" onclick="toggleTranslation()" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded border border-blue-600 transition-colors cursor-pointer flex items-center gap-2 shadow-sm font-bold">
                    🌐 开启中文翻译
                </button>
                <button onclick="toggleTheme()" class="px-5 py-2.5 bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-800 dark:text-white rounded border border-slate-400 dark:border-slate-600 transition-colors cursor-pointer flex items-center gap-2 shadow-sm">
                    🌓 昼夜切换
                </button>
                <button onclick="refreshAll()" class="px-5 py-2.5 bg-slate-800 hover:bg-emerald-600 dark:bg-slate-800 dark:hover:bg-emerald-600 text-white rounded border border-slate-600 transition-colors cursor-pointer flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    立即刷新
                </button>
            </div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="board-container"></div>
    </div>

    <script>
        const MY_PROXY = 'https://api.ta1zai.com/?url=';

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', color: 'border-orange-500 dark:border-orange-500' },
            { id: 'twitter', name: 'X Trend (US)', color: 'border-slate-400 dark:border-slate-100' },
            { id: 'gamersky', name: '游民星空', color: 'border-red-600 dark:border-red-500' },
            { id: '3dm', name: '3DM游戏网', color: 'border-red-500 dark:border-red-500' },
            { id: 'yystv', name: '游研社', color: 'border-red-400 dark:border-red-400' },
            { id: 'gameres', name: 'GameRes游资网', color: 'border-blue-500 dark:border-blue-500' }, // 【新增】
            { id: 'gcores', name: '机核网', color: 'border-slate-800 dark:border-slate-500' }, // 【新增】
            { id: 'sykong', name: '手游那点事', color: 'border-teal-600 dark:border-teal-500' }, // 【新增】
            { id: 'gouhuo', name: '篝火营地', color: 'border-orange-600 dark:border-orange-500' }, // 【新增】
            { id: 'hackernews', name: 'Hacker News', color: 'border-orange-600 dark:border-orange-600' },
            { id: 'nyt', name: 'The New York Times', color: 'border-stone-800 dark:border-stone-400' },
            { id: 'bbc', name: 'BBC Global News', color: 'border-red-700 dark:border-red-700' },
            { id: 'imdb', name: 'IMDb Popular', color: 'border-yellow-600 dark:border-yellow-500' }
        ];

        let isTranslated = false;
        let isTranslating = false;

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        function updateRefreshTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('last-refresh').innerText = `上次刷新: ${timeString}`;
        }

        async function fetchViaBackend(url) {
            const response = await fetch(MY_PROXY + encodeURIComponent(url), { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }

        function parseRSS(xmlStr) {
            const doc = new DOMParser().parseFromString(xmlStr, "text/xml");
            const items = Array.from(doc.querySelectorAll("item")).slice(0, 15);
            return items.map(item => {
                const titleNode = item.querySelector("title");
                const linkNode = item.querySelector("link");
                return {
                    title: titleNode ? titleNode.textContent.trim() : "Unknown Title",
                    link: linkNode ? linkNode.textContent.trim() : "#"
                };
            });
        }

        async function getRealTimeData(platform) {
            let items = [];
            let raw = '';

            switch (platform.id) {
                case 'reddit':
                    raw = await fetchViaBackend('https://www.reddit.com/r/all/hot.json?limit=15');
                    JSON.parse(raw).data.children.slice(0, 15).forEach(c => {
                        items.push({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` });
                    });
                    break;
                case 'twitter':
                    raw = await fetchViaBackend('https://trends24.in/united-states/');
                    const docTwitter = new DOMParser().parseFromString(raw, "text/html");
                    docTwitter.querySelectorAll('.trend-card__list li a').forEach((node, i) => {
                        if(i < 15) items.push({ title: node.textContent.trim(), link: node.href });
                    });
                    break;
                case 'gamersky': 
                    const mirrors = [
                        'https://rsshub.rssforever.com/gamersky/news',
                        'https://rss.shab.fun/gamersky/news',
                        'https://rsshub.ktachibana.party/gamersky/news',
                        'https://rsshub.noxussj.top/gamersky/news'
                    ];
                    for (let mirrorUrl of mirrors) {
                        try {
                            raw = await fetchViaBackend(mirrorUrl);
                            items = parseRSS(raw);
                            if (items.length > 0) break;
                        } catch (e) { console.warn('Gamersky mirror blocked, switching...'); }
                    }
                    if (items.length === 0) throw new Error("所有游民星空镜像源均被拦截");
                    break;
                case '3dm':
                    const mirrors3dm = [
                        'https://rsshub.rssforever.com/3dmgame/news',
                        'https://rss.shab.fun/3dmgame/news',
                        'https://rsshub.ktachibana.party/3dmgame/news',
                        'https://rsshub.noxussj.top/3dmgame/news'
                    ];
                    for (let mirrorUrl3dm of mirrors3dm) {
                        try {
                            raw = await fetchViaBackend(mirrorUrl3dm);
                            items = parseRSS(raw);
                            if (items.length > 0) break;
                        } catch (e) { console.warn('3DM mirror blocked, switching...'); }
                    }
                    if (items.length === 0) throw new Error("所有3DM镜像源均被拦截");
                    break;
                case 'yystv': 
                    const mirrorsYys = [
                        'https://rsshub.rssforever.com/yystv/docs',
                        'https://rss.shab.fun/yystv/docs',
                        'https://rsshub.ktachibana.party/yystv/docs',
                        'https://rsshub.noxussj.top/yystv/docs'
                    ];
                    for (let mirrorUrlYys of mirrorsYys) {
                        try {
                            raw = await fetchViaBackend(mirrorUrlYys);
                            items = parseRSS(raw);
                            if (items.length > 0) break;
                        } catch (e) { console.warn('YYSTV mirror blocked, switching...'); }
                    }
                    if (items.length === 0) throw new Error("所有游研社镜像源均被拦截");
                    break;
                case 'gameres': // 【新增】游资网
                    const mirrorsGameres = [
                        'https://rsshub.rssforever.com/gameres/news',
                        'https://rss.shab.fun/gameres/news',
                        'https://rsshub.ktachibana.party/gameres/news',
                        'https://rsshub.noxussj.top/gameres/news'
                    ];
                    for (let url of mirrorsGameres) {
                        try {
                            raw = await fetchViaBackend(url);
                            items = parseRSS(raw);
                            if (items.length > 0) break;
                        } catch (e) { console.warn('GameRes mirror blocked, switching...'); }
                    }
                    if (items.length === 0) throw new Error("所有游资网镜像源均被拦截");
                    break;
                case 'gcores': // 【新增】机核网
                    const mirrorsGcores = [
                        'https://rsshub.rssforever.com/gcores/category/1',
                        'https://rss.shab.fun/gcores/category/1',
                        'https://rsshub.ktachibana.party/gcores/category/1',
                        'https://rsshub.noxussj.top/gcores/category/1'
                    ];
                    for (let url of mirrorsGcores) {
                        try {
                            raw = await fetchViaBackend(url);
                            items = parseRSS(raw);
                            if (items.length > 0) break;
                        } catch (e) { console.warn('Gcores mirror blocked, switching...'); }
                    }
                    if (items.length === 0) throw new Error("所有机核镜像源均被拦截");
                    break;
                case 'sykong': // 【新增】手游那点事
                    const mirrorsSykong = [
                        'https://rsshub.rssforever.com/sykong/news',
                        'https://rss.shab.fun/sykong/news',
                        'https://rsshub.ktachibana.party/sykong/news',
                        'https://rsshub.noxussj.top/sykong/news'
                    ];
                    for (let url of mirrorsSykong) {
                        try {
                            raw = await fetchViaBackend(url);
                            items = parseRSS(raw);
                            if (items.length > 0) break;
                        } catch (e) { console.warn('Sykong mirror blocked, switching...'); }
                    }
                    if (items.length === 0) throw new Error("所有手游那点事镜像源均被拦截");
                    break;
                case 'gouhuo': // 【新增】篝火营地
                    const mirrorsGouhuo = [
                        'https://rsshub.rssforever.com/gouhuo/news',
                        'https://rss.shab.fun/gouhuo/news',
                        'https://rsshub.ktachibana.party/gouhuo/news',
                        'https://rsshub.noxussj.top/gouhuo/news'
                    ];
                    for (let url of mirrorsGouhuo) {
                        try {
                            raw = await fetchViaBackend(url);
                            items = parseRSS(raw);
                            if (items.length > 0) break;
                        } catch (e) { console.warn('Gouhuo mirror blocked, switching...'); }
                    }
                    if (items.length === 0) throw new Error("所有篝火营地镜像源均被拦截");
                    break;
                case 'hackernews':
                    const hnRes = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json', { cache: 'no-store' });
                    const hnIds = await hnRes.json();
                    const hnItems = await Promise.all(hnIds.slice(0, 15).map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`, { cache: 'no-store' }).then(r => r.json())));
                    hnItems.forEach(item => {
                        items.push({ title: item.title, link: item.url || `https://news.ycombinator.com/item?id=${item.id}` });
                    });
                    break;
                case 'nyt':
                    raw = await fetchViaBackend('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml');
                    items = parseRSS(raw);
                    break;
                case 'bbc':
                    raw = await fetchViaBackend('http://feeds.bbci.co.uk/news/rss.xml');
                    items = parseRSS(raw);
                    break;
                case 'imdb':
                    raw = await fetchViaBackend('https://api.themoviedb.org/3/trending/movie/day?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb');
                    JSON.parse(raw).results.slice(0, 15).forEach(m => {
                        items.push({ title: m.title, link: `https://www.themoviedb.org/movie/${m.id}` });
                    });
                    break;
            }
            
            if(items.length === 0) throw new Error("Parsed empty array");
            return items;
        }

        async function translateWrapper(index) {
            const wrapper = document.getElementById(`card-wrapper-${index}`);
            if (!wrapper) return;
            const links = wrapper.querySelectorAll('.hot-title');
            const needsTranslation = Array.from(links).some(l => !l.dataset.zh);
            
            if (needsTranslation && links.length > 0) {
                const titles = Array.from(links).map(l => l.dataset.en);
                const textToTranslate = titles.join(' ❖ ');
                try {
                    const googleApiUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-CN&dt=t&q=${encodeURIComponent(textToTranslate)}`;
                    const proxiedUrl = MY_PROXY + encodeURIComponent(googleApiUrl);
                    const res = await fetch(proxiedUrl);
                    const json = await res.json();
                    let translatedText = '';
                    json[0].forEach(seg => { if(seg[0]) translatedText += seg[0]; });
                    const translatedTitles = translatedText.split('❖').map(t => t.trim());
                    links.forEach((link, idx) => {
                        if (translatedTitles[idx]) {
                            let cleanTitle = translatedTitles[idx].replace(/^[\s>]+/, '');
                            link.dataset.zh = cleanTitle;
                            link.innerText = '> ' + cleanTitle;
                        }
                    });
                } catch (e) { console.error('Translate error', e); }
            } else {
                links.forEach(link => {
                    if (link.dataset.zh) link.innerText = '> ' + link.dataset.zh;
                });
            }
        }

        async function toggleTranslation() {
            if (isTranslating) return;
            const btn = document.getElementById('translate-btn');
            if (!isTranslated) {
                isTranslating = true;
                btn.innerHTML = '⏳ 神经翻译中...';
                btn.classList.add('animate-pulse');
                const promises = platforms.map((p, i) => translateWrapper(i));
                await Promise.all(promises);
                isTranslated = true;
                isTranslating = false;
                btn.classList.remove('animate-pulse');
                btn.innerHTML = '文 关闭中文翻译';
                btn.classList.replace('bg-blue-600', 'bg-emerald-600');
                btn.classList.replace('border-blue-600', 'border-emerald-600');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-emerald-700');
            } else {
                isTranslated = false;
                btn.innerHTML = '🌐 开启中文翻译';
                document.querySelectorAll('.hot-title').forEach(link => {
                    link.innerText = '> ' + link.dataset.en;
                });
                btn.classList.replace('bg-emerald-600', 'bg-blue-600');
                btn.classList.replace('border-emerald-600', 'border-blue-600');
                btn.classList.replace('hover:bg-emerald-700', 'hover:bg-blue-700');
            }
        }

        async function loadCard(platform, index, isRefreshing = false) {
            const wrapper = document.getElementById(`card-wrapper-${index}`);
            const loadingText = isRefreshing ? `Syncing_${platform.name}...` : `Fetching_${platform.name}...`;
            wrapper.innerHTML = `<div class="h-[520px] bg-white dark:bg-slate-900/50 border-2 border-slate-300 dark:border-slate-800 rounded-lg flex items-center justify-center"><span class="text-sm animate-pulse uppercase text-emerald-600 dark:text-emerald-700 font-bold tracking-widest font-smooth-rounded">${loadingText}</span></div>`;

            try {
                const items = await getRealTimeData(platform);
                let html = `
                    <div class="h-[520px] bg-white dark:bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-5 bg-slate-100 dark:bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-200 dark:border-slate-800">
                            <span class="font-black text-lg uppercase text-slate-800 dark:text-white tracking-widest font-smooth-rounded">${platform.name}</span>
                            <div class="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-5 space-y-4 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    const safeTitle = item.title.replace(/"/g, '&quot;');
                    html += `<li class="border-b border-slate-100 dark:border-slate-800/50 pb-3 last:border-0"><a href="${item.link}" target="_blank" data-en="${safeTitle}" class="hot-title text-base leading-relaxed hover:text-emerald-600 dark:hover:text-emerald-400 block tracking-wide text-slate-700 dark:text-slate-300 transition-colors font-smooth-rounded"> > ${item.title}</a></li>`;
                });
                wrapper.innerHTML = html + `</ul></div>`;
                if (isTranslated) await translateWrapper(index);
            } catch (err) {
                console.error(`Error on ${platform.id}:`, err);
                wrapper.innerHTML = `<div class="h-[520px] p-6 text-center flex flex-col items-center justify-center bg-white dark:bg-slate-900 game-border"><span class="text-red-500 font-bold text-sm uppercase italic tracking-widest font-smooth-rounded">[SYSTEM OFFLINE]</span><p class="text-sm text-slate-500 dark:text-slate-600 mt-2 font-mono">Check Proxy or Mirrors.</p></div>`;
            }
        }

        async function refreshAll() {
            document.getElementById('last-refresh').innerText = `同步中...`;
            const promises = platforms.map((p, i) => loadCard(p, i, true));
            await Promise.all(promises);
            updateRefreshTime();
        }

        async function init() {
            const container = document.getElementById('board-container');
            container.innerHTML = ''; 
            platforms.forEach((p, index) => {
                const wrapper = document.createElement('div');
                wrapper.id = `card-wrapper-${index}`;
                container.appendChild(wrapper);
            });
            const promises = platforms.map((p, i) => loadCard(p, i, false));
            await Promise.all(promises);
            updateRefreshTime();
        }
        init();
    </script>
</body>
</html>
