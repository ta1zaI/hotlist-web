<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Intel Matrix // FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Global 5 Hotlist</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase font-bold tracking-widest">
                    <span class="animate-blink text-red-500">● LIVE</span> // NATIVE JSON ENGINE
                </p>
            </div>
            <div class="text-[10px] text-slate-500 italic mt-4 md:mt-0">PROXY: BILLOWING-SALAD (ACTIVE)</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        const MY_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', color: 'border-orange-500' },
            { id: 'twitter', name: 'X Trend (US)', color: 'border-slate-100' },
            { id: 'imdb', name: 'IMDb Popular', color: 'border-yellow-500' },
            { id: 'youtube', name: 'YouTube Trend (US)', color: 'border-red-600' },
            { id: 'tiktok', name: 'TikTok Trend (7D)', color: 'border-pink-500' }
        ];

        async function fetchRawData(url) {
            const response = await fetch(MY_PROXY + encodeURIComponent(url), { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }

        async function getRealTimeData(platformId) {
            let items = [];
            let raw = '';
            const parser = new DOMParser();

            switch (platformId) {
                // ==========================================
                // 以下三个是你已经跑通的，一字不改，绝对锁定！
                // ==========================================
                case 'reddit':
                    raw = await fetchRawData('https://www.reddit.com/r/all/hot.json?limit=15');
                    JSON.parse(raw).data.children.slice(0, 15).forEach(c => {
                        items.push({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` });
                    });
                    break;

                case 'twitter':
                    raw = await fetchRawData('https://trends24.in/united-states/');
                    const docTwitter = parser.parseFromString(raw, "text/html");
                    const tNodes = docTwitter.querySelectorAll('.trend-card__list li a');
                    for(let i=0; i<Math.min(tNodes.length, 15); i++) {
                        items.push({ title: tNodes[i].textContent.trim(), link: tNodes[i].href });
                    }
                    break;

                case 'imdb':
                    raw = await fetchRawData('https://api.themoviedb.org/3/trending/movie/day?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb');
                    JSON.parse(raw).results.slice(0, 15).forEach(m => {
                        items.push({ title: m.title, link: `https://www.themoviedb.org/movie/${m.id}` });
                    });
                    break;

                // ==========================================
                // 以下两个是专门为你精准修复的终极突破口
                // ==========================================
                case 'youtube':
                    // 节点轮询池：防止单个 API 节点宕机报 404
                    const ytNodes = [
                        'https://pipedapi.kavin.rocks/trending?region=US',
                        'https://pipedapi.tokhmi.xyz/trending?region=US',
                        'https://piped-api.garudalinux.org/trending?region=US',
                        'https://pipedapi.smnz.de/trending?region=US'
                    ];
                    let ytParsed = false;
                    for (let node of ytNodes) {
                        try {
                            raw = await fetchRawData(node);
                            let json = JSON.parse(raw);
                            if (json.length > 0) {
                                json.slice(0, 15).forEach(v => {
                                    items.push({ title: v.title, link: `https://www.youtube.com${v.url}` });
                                });
                                ytParsed = true;
                                break; // 拿到数据立刻跳出循环
                            }
                        } catch (e) {
                            console.warn(`YouTube node ${node} failed, trying next...`);
                        }
                    }
                    if (!ytParsed) throw new Error("All YouTube nodes failed");
                    break;

                case 'tiktok':
                    // 完全锁定你截图中的 URL
                    const tkHtmlUrl = 'https://ads.tiktok.com/business/creativecenter/inspiration/popular/hashtag/pc/zh?period=7&region=US';
                    let tags = [];
                    
                    try {
                        raw = await fetchRawData(tkHtmlUrl);
                        const regexList = [/"hashtag_name":"([^"]+)"/g, /"keyword":"([^"]+)"/g];
                        for (let regex of regexList) {
                            let match;
                            while ((match = regex.exec(raw)) !== null && tags.length < 15) {
                                let tagStr = match[1].replace(/\\u[\dA-F]{4}/gi, (m) => String.fromCharCode(parseInt(m.replace(/\\u/g, ''), 16)));
                                if(!tags.includes(tagStr) && tagStr.length > 1) tags.push(tagStr);
                            }
                            if (tags.length > 0) break;
                        }
                    } catch (err) {
                        console.warn('Failed to fetch TikTok HTML, falling back to pure API');
                    }

                    // 终极双保险：如果你的 CF 代理被防爬虫页面拦截（HTML里没有话题词）
                    // 直接穿透调用该页面背后的隐藏 JSON API 接口！
                    if(tags.length === 0) {
                        const tkApiUrl = 'https://ads.tiktok.com/creative_radar_api/v1/popular_trend/hashtag/list?period=7&page=1&limit=15&country_code=US';
                        const apiRaw = await fetchRawData(tkApiUrl);
                        const jsonData = JSON.parse(apiRaw);
                        if (jsonData.data && jsonData.data.list) {
                            jsonData.data.list.forEach(tag => tags.push(tag.hashtag_name));
                        }
                    }

                    if(tags.length === 0) throw new Error("Parsed empty TikTok array");

                    tags.slice(0, 15).forEach(t => {
                        items.push({ title: '#' + t, link: `https://www.tiktok.com/tag/${encodeURIComponent(t)}` });
                    });
                    break;
            }
            
            if(items.length === 0) throw new Error("Parsed empty array");
            return items;
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[500px] bg-slate-900/50 border-2 border-slate-800 rounded-lg flex items-center justify-center"><span class="text-[9px] animate-pulse uppercase text-emerald-700 font-bold tracking-widest">Fetching_${platform.name}...</span></div>`;

            try {
                const items = await getRealTimeData(platform.id);
                let html = `
                    <div class="h-[500px] bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-3 bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-800">
                            <span class="font-black text-[10px] uppercase text-white tracking-widest">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block tracking-tight font-sans text-slate-300 transition-colors"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                console.error(`Error on ${platform.id}:`, err);
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-slate-900 game-border"><span class="text-red-500 font-bold text-[10px] uppercase italic tracking-widest">[ACCESS DENIED]</span><p class="text-[9px] text-slate-600 mt-2 font-mono">Target WAF block / Endpoint dead.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); 
            }
        }
        init();
    </script>
</body>
</html>
