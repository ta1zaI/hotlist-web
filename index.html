<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网硬核玩家资讯矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6 font-sans">

    <div class="max-w-[1600px] mx-auto">
        <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-8 tracking-wide">
            🎮 硬核玩家全网矩阵
        </h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="board-container">
            </div>
    </div>

    <script>
        // 【保持不动】你的成功之匙
        const MY_CF_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';
        
        // 【稳健分流】把数据源分散开
        const PRIVATE_NODE = 'https://rss-hub-livid-zeta.vercel.app'; // 你的私人引擎
        const PUBLIC_NODES = [
            'https://rsshub.rssforever.com',
            'https://hub.slarker.me',
            'https://rss.shab.fun'
        ];

        const platforms = [
            // 成功点：Reddit (保持原样)
            { name: 'Reddit (Gaming)', type: 'json', url: 'https://www.reddit.com/r/gaming/hot.json', color: 'bg-orange-50 text-orange-600 border-orange-200' },
            
            // 核心点：游戏资讯 (切回你最稳定的私人 Vercel 引擎)
            { name: '游民星空', type: 'xml', url: `${PRIVATE_NODE}/gamersky/news`, color: 'bg-yellow-50 text-yellow-700 border-yellow-200' },
            { name: '机核网 Gcores', type: 'xml', url: `${PRIVATE_NODE}/gcores/category/news`, color: 'bg-zinc-900 text-white border-zinc-700' },
            { name: '3DM 游戏网', type: 'xml', url: `${PRIVATE_NODE}/3dm/news`, color: 'bg-green-50 text-green-600 border-green-200' },
            { name: 'TapTap 热门', type: 'xml', url: `${PRIVATE_NODE}/taptap/topic/hot`, color: 'bg-teal-50 text-teal-600 border-teal-200' },
            { name: '游研社', type: 'xml', url: `${PRIVATE_NODE}/yystv/docs`, color: 'bg-indigo-50 text-indigo-600 border-indigo-200' },
            
            // 挑战点：大众热搜 (使用多节点自动轮询)
            { name: 'B站热门', type: 'xml', route: '/bilibili/v/popular/all', color: 'bg-blue-50 text-blue-600 border-blue-200' },
            { name: '微博热搜', type: 'xml', route: '/weibo/search/hot', color: 'bg-red-50 text-red-600 border-red-200' },
            { name: '抖音热点', type: 'xml', route: '/douyin/hot', color: 'bg-zinc-800 text-white border-gray-700' },
            { name: 'YouTube 热门', type: 'xml', route: '/youtube/trending', color: 'bg-red-50 text-red-700 border-red-200' },
            { name: 'Twitter 趋势', type: 'xml', route: '/twitter/trends/23424977', color: 'bg-sky-50 text-sky-500 border-sky-200' },
            { name: '手游那点事', type: 'xml', route: '/zhihu/people/shou-you-na-dian-shi/activities', color: 'bg-blue-50 text-blue-800 border-blue-200' }
        ];

        async function tryFetch(url, type) {
            const fetchUrl = MY_CF_PROXY + encodeURIComponent(url);
            const response = await fetch(fetchUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return type === 'json' ? await response.json() : await response.text();
        }

        async function fetchAPI(platform) {
            try {
                let data;
                // 如果定义了固定 URL (如 Reddit 和 游戏站)，直接抓取
                if (platform.url) {
                    data = await tryFetch(platform.url, platform.type);
                } 
                // 如果是通用路由，尝试多个公共节点，直到成功为止
                else {
                    let success = false;
                    for (let node of PUBLIC_NODES) {
                        try {
                            data = await tryFetch(node + platform.route, 'xml');
                            success = true;
                            break; 
                        } catch (e) { continue; }
                    }
                    if (!success) throw new Error('所有公共节点均繁忙');
                }

                let items = [];
                if (platform.type === 'json') {
                    items = data.data.children.map(child => ({
                        title: child.data.title,
                        link: `https://www.reddit.com${child.data.permalink}`
                    }));
                } else {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(data, "text/xml");
                    const nodes = xmlDoc.querySelectorAll("item");
                    if (nodes.length === 0) throw new Error('解析内容为空');
                    for (let i = 0; i < Math.min(nodes.length, 12); i++) {
                        items.push({
                            title: nodes[i].querySelector("title")?.textContent || '无标题',
                            link: nodes[i].querySelector("link")?.textContent || '#'
                        });
                    }
                }

                let html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[400px] animate-fade-in">
                        <h2 class="text-md font-bold p-3 border-b ${platform.color}">${platform.name}</h2>
                        <ul class="p-3 space-y-2 overflow-y-auto flex-1">
                `;
                for (let item of items) {
                    html += `
                        <li class="flex items-start border-b border-gray-50 pb-2 last:border-0">
                            <a href="${item.link}" target="_blank" class="text-gray-700 hover:text-blue-600 hover:underline transition-colors line-clamp-2 text-xs leading-tight flex-1">
                                ${item.title}
                            </a>
                        </li>
                    `;
                }
                html += `</ul></div>`;
                return html;
            } catch (error) {
                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 h-[400px] flex flex-col items-center justify-center animate-fade-in">
                        <span class="text-red-400 font-bold text-center mb-2 text-sm">🚫 ${platform.name}</span>
                        <span class="text-gray-400 text-xs text-center">节点维护中，请稍后刷新</span>
                    </div>
                `;
            }
        }

        async function init() {
            const container = document.getElementById('board-container');
            for (let i = 0; i < platforms.length; i++) {
                container.innerHTML += `<div id="card-${i}" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 h-[400px] flex flex-col items-center justify-center"><span class="text-blue-400 font-bold mb-2 animate-pulse text-sm">🌐 正在连线：${platforms[i].name}...</span></div>`;
            }
            // 瀑布流加载
            for (let i = 0; i < platforms.length; i++) {
                const html = await fetchAPI(platforms[i]);
                document.getElementById(`card-${i}`).outerHTML = html;
                await new Promise(r => setTimeout(r, 200)); 
            }
        }

        init();
    </script>
</body>
</html>
