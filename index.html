<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 5 Matrix - Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes scanLine { 0% { transform: translateY(-100%); } 100% { transform: translateY(1000%); } }
        .scanline { width: 100%; height: 2px; background: rgba(34, 197, 94, 0.1); position: absolute; animation: scanLine 8s linear infinite; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-950 p-4 md:p-8 font-mono text-emerald-500 overflow-x-hidden">

    <div class="scanline"></div>

    <div class="max-w-[1600px] mx-auto relative z-10">
        <header class="mb-12 border-b border-emerald-900/50 pb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-[0.2em] uppercase text-white">Global 5 Intelligence</h1>
                <p class="text-[10px] text-emerald-700 mt-2 italic tracking-widest">STATUS: ENCRYPTED // NODE: BILLOWING-SALAD-1C9B</p>
            </div>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="px-4 py-1 border border-emerald-800 text-[10px] hover:bg-emerald-900/30 transition-all uppercase">Re-Sync All</button>
            </div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 【已保留】你的专属成功代理
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        // 备用节点资源池：一个挂了，自动跳下一个
        const RSS_MIRRORS = [
            'https://rsshub.rssforever.com',
            'https://hub.slarker.me',
            'https://rss.shab.fun',
            'https://rsshub.anyant.com',
            'https://rsshub.app'
        ];

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', theme: 'border-orange-500' },
            { id: 'imdb', name: 'IMDb Trending', route: '/imdb/trending/movie', theme: 'border-yellow-500' },
            { id: 'twitter', name: 'X / Twitter', route: '/twitter/trends/1', theme: 'border-slate-400' },
            { id: 'tiktok', name: 'TikTok Hot', route: '/tiktok/trending/worldwide', theme: 'border-pink-500' },
            { id: 'youtube', name: 'YouTube Trend', route: '/youtube/trending/en', theme: 'border-red-600' }
        ];

        // 核心：智能轮询抓取
        async function fetchWithRetry(platform) {
            // Reddit 走官方 JSON 路径
            if (platform.type === 'json') {
                const r = await fetch(PROXY + encodeURIComponent(platform.url));
                if (!r.ok) throw new Error('OFFLINE');
                return await r.json();
            }

            // 其它平台依次尝试 5 个不同的公共节点
            for (let mirror of RSS_MIRRORS) {
                try {
                    const fullUrl = mirror + platform.route;
                    const r = await fetch(PROXY + encodeURIComponent(fullUrl));
                    if (r.ok) return await r.text();
                } catch (e) { continue; }
            }
            throw new Error('ALL_NODES_FAILED');
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[550px] bg-slate-900/30 border border-emerald-950 p-6 flex items-center justify-center"><span class="animate-pulse text-[10px] tracking-widest text-emerald-800">CONNECTING_${platform.name}...</span></div>`;

            try {
                const data = await fetchWithRetry(platform);
                let items = [];

                if (platform.type === 'json') {
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else {
                    const doc = new DOMParser().parseFromString(data, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    if (nodes.length === 0) throw new Error('EMPTY');
                    nodes.forEach((n, i) => { if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); });
                }

                let html = `
                    <div class="h-[550px] bg-slate-900/80 border-t-2 ${platform.theme} flex flex-col overflow-hidden shadow-2xl group transition-all hover:bg-slate-900">
                        <div class="p-4 bg-slate-800/40 flex justify-between items-center border-b border-slate-800/50">
                            <span class="font-bold text-[10px] tracking-tighter uppercase text-white">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                        </div>
                        <ul class="p-4 space-y-4 overflow-y-auto flex-1 custom-scrollbar text-[11px] leading-relaxed">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-emerald-950/30 pb-3 last:border-0 hover:bg-emerald-900/10 transition-all"><a href="${item.link}" target="_blank" class="hover:text-white block"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="text-center p-6"><span class="text-red-500 font-bold text-[10px] uppercase">[DATA_REJECTED]</span><p class="text-[9px] text-slate-600 mt-2">Check Local VPN Connection</p><button onclick="location.reload()" class="mt-4 text-[9px] text-emerald-800 hover:text-emerald-500 underline">RE-CONNECT</button></div>`;
            }
        }

        async function init() {
            // 采用流水线顺序加载，确保存活率
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); 
            }
        }
        init();
    </script>
</body>
</html>
