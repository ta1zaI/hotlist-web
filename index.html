<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的游戏资讯热榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-8">🎮 核心玩家资讯站</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="board-container">
            <div id="loading" class="col-span-full text-center text-gray-500 font-bold text-xl py-10">
                正在通过专属引擎加载全网游戏资讯...
            </div>
        </div>
    </div>

    <script>
        // 全部请求你自己的代理路径
        const platforms = [
            { name: '3DM 游戏网', url: '/api/3dm', color: 'bg-orange-50 text-orange-600 border-orange-200' },
            { name: '游研社', url: '/api/yystv', color: 'bg-blue-50 text-blue-600 border-blue-200' },
            { name: 'TapTap 热门', url: '/api/taptap', color: 'bg-teal-50 text-teal-600 border-teal-200' },
            { name: '游民星空', url: '/api/gamersky', color: 'bg-zinc-800 text-white border-zinc-700' }
        ];

        async function fetchAPI(platform) {
            try {
                const response = await fetch(platform.url);
                if (!response.ok) throw new Error(`HTTP 错误: ${response.status}`);
                
                const text = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(text, "text/xml");
                const items = xmlDoc.querySelectorAll("item");

                if (items.length === 0) throw new Error('无数据');

                let html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[500px]">
                        <h2 class="text-lg font-bold p-4 border-b ${platform.color}">${platform.name}</h2>
                        <ul class="p-4 space-y-3 overflow-y-auto flex-1">
                `;

                for (let i = 0; i < Math.min(items.length, 15); i++) {
                    const titleNode = items[i].querySelector("title");
                    const linkNode = items[i].querySelector("link");
                    
                    const title = titleNode ? titleNode.textContent : '无标题';
                    const link = linkNode ? linkNode.textContent : '#';
                    
                    html += `
                        <li class="flex items-start">
                            <span class="font-bold text-gray-400 w-6 shrink-0">${i+1}.</span>
                            <a href="${link}" target="_blank" class="text-gray-700 hover:text-blue-600 hover:underline transition-colors line-clamp-2 text-sm leading-tight">
                                ${title}
                            </a>
                        </li>
                    `;
                }
                html += `</ul></div>`;
                return html;
            } catch (error) {
                console.error(`${platform.name} 抓取失败:`, error);
                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 h-[500px] flex flex-col items-center justify-center">
                        <span class="text-red-400 font-bold text-center mb-2">🚫 ${platform.name}</span>
                        <span class="text-gray-500 text-sm">源站抓取超时或被限流</span>
                    </div>
                `;
            }
        }

        async function init() {
            const container = document.getElementById('board-container');
            const loading = document.getElementById('loading');
            
            let finalHtml = '';
            const promises = platforms.map(p => fetchAPI(p));
            const results = await Promise.all(promises);
            
            loading.style.display = 'none';
            results.forEach(html => { finalHtml += html; });
            container.innerHTML = finalHtml;
        }

        init();
    </script>
</body>
</html>
