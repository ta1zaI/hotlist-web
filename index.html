<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 5 Matrix - Intelligence Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-black p-4 md:p-8 font-mono text-emerald-500">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-10 border-b border-emerald-900/30 pb-6">
            <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white">Global Hot 5 Matrix</h1>
            <p class="text-[9px] text-emerald-800 mt-1 uppercase">Node: Billowing-Salad // Status: Multi-Mirror Enabled</p>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 你的金钥匙
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        // 备选节点池：一个不通，秒换下一个
        const MIRRORS = [
            'https://hub.slarker.me',
            'https://rsshub.rssforever.com',
            'https://rss.shab.fun',
            'https://rsshub.app'
        ];

        const platforms = [
            { name: 'Reddit /r/all', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', color: 'border-orange-600' },
            { name: 'YouTube Trending', type: 'rss', route: '/youtube/trending/en', color: 'border-red-600' },
            { name: 'IMDb Trending', type: 'rss', route: '/imdb/trending/movie', color: 'border-yellow-600' },
            { name: 'X / Twitter', type: 'rss', route: '/twitter/trends/1', color: 'border-white' },
            { name: 'TikTok Trend', type: 'rss', route: '/tiktok/trending/worldwide', color: 'border-pink-600' }
        ];

        async function fetchWithRetry(platform, mirrorIndex = 0) {
            const url = platform.url || (MIRRORS[mirrorIndex] + platform.route);
            const response = await fetch(PROXY + encodeURIComponent(url));
            if (!response.ok) {
                if (!platform.url && mirrorIndex < MIRRORS.length - 1) {
                    return fetchWithRetry(platform, mirrorIndex + 1);
                }
                throw new Error('Connection failed');
            }
            return platform.type === 'json' ? response.json() : response.text();
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[550px] bg-zinc-900/50 border border-zinc-800 rounded-xl flex items-center justify-center animate-pulse text-[10px] uppercase tracking-tighter">Syncing_${platform.name}...</div>`;

            try {
                const data = await fetchWithRetry(platform);
                let items = [];

                if (platform.type === 'json') {
                    items = data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
                } else {
                    const doc = new DOMParser().parseFromString(data, "text/xml");
                    const nodes = doc.querySelectorAll("item");
                    nodes.forEach((n, i) => { if(i < 15) items.push({ title: n.querySelector("title")?.textContent, link: n.querySelector("link")?.textContent }); });
                }

                let html = `
                    <div class="h-[550px] bg-zinc-900/80 border-t-2 ${platform.color} rounded-xl flex flex-col overflow-hidden shadow-2xl animate-fade">
                        <div class="p-4 bg-black/40 flex justify-between items-center border-b border-white/5">
                            <span class="font-bold text-[10px] uppercase">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div>
                        </div>
                        <ul class="p-4 space-y-4 overflow-y-auto flex-1 text-[11px] leading-relaxed custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-white/5 pb-2 hover:bg-white/5 transition-all"><a href="${item.link}" target="_blank" class="text-zinc-400 hover:text-white block"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center"><span class="text-red-900 font-bold text-[10px] uppercase">[ERROR]</span><p class="text-[9px] text-zinc-600 mt-2 italic font-mono">All mirrors blocked. Re-syncing recommended.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); // 错峰抓取，避开并发限流
            }
        }
        init();
    </script>
</body>
</html>
