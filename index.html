<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Matrix // HEADLESS ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Omni-Matrix 4</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase font-bold tracking-widest">
                    <span class="animate-blink text-red-500">● LIVE</span> // RESIDENTIAL HEADLESS SCRAPER
                </p>
            </div>
            <div class="text-[10px] text-slate-500 italic mt-4 md:mt-0">TIKTOK WAF BYPASS: PREMIUM ACTIVE</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="board-container"></div>
    </div>

    <script>
        const MY_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';
        // 你的专属 ScraperAPI 金钥匙
        const SCRAPER_API_KEY = '55cc9fdf6a593f6134c563837a4ace68'; 

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', color: 'border-orange-500' },
            { id: 'twitter', name: 'X Trend (US)', color: 'border-slate-100' },
            { id: 'imdb', name: 'IMDb Popular', color: 'border-yellow-500' },
            { id: 'tiktok', name: 'TikTok Trend (7D)', color: 'border-pink-500' }
        ];

        async function fetchRawData(url) {
            const response = await fetch(MY_PROXY + encodeURIComponent(url), { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }

        async function getRealTimeData(platformId) {
            let items = [];
            let raw = '';
            const parser = new DOMParser();

            switch (platformId) {
                // ==========================================
                // 【稳如磐石区】：Reddit, Twitter, IMDb 保持不变
                // ==========================================
                case 'reddit':
                    raw = await fetchRawData('https://www.reddit.com/r/all/hot.json?limit=15');
                    JSON.parse(raw).data.children.slice(0, 15).forEach(c => {
                        items.push({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` });
                    });
                    break;

                case 'twitter':
                    raw = await fetchRawData('https://trends24.in/united-states/');
                    const docTwitter = parser.parseFromString(raw, "text/html");
                    const tNodes = docTwitter.querySelectorAll('.trend-card__list li a');
                    for(let i=0; i<Math.min(tNodes.length, 15); i++) {
                        items.push({ title: tNodes[i].textContent.trim(), link: tNodes[i].href });
                    }
                    break;

                case 'imdb':
                    raw = await fetchRawData('https://api.themoviedb.org/3/trending/movie/day?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb');
                    JSON.parse(raw).results.slice(0, 15).forEach(m => {
                        items.push({ title: m.title, link: `https://www.themoviedb.org/movie/${m.id}` });
                    });
                    break;

                // ==========================================
                // 【终极突围区】：TikTok 真实浏览器级渲染
                // ==========================================
                case 'tiktok':
                    let tags = [];
                    
                    // 战术 A：优先尝试使用 Premium 住宅 IP 直连官方隐藏 JSON 接口 (速度快)
                    const tkApiUrl = 'https://ads.tiktok.com/creative_radar_api/v1/popular_trend/hashtag/list?period=7&page=1&limit=15&country_code=US';
                    const fastScraperUrl = `https://api.scraperapi.com?api_key=${SCRAPER_API_KEY}&url=${encodeURIComponent(tkApiUrl)}&premium=true`;
                    
                    try {
                        const fastRes = await fetch(fastScraperUrl, { cache: 'no-store' });
                        const fastJson = await fastRes.json();
                        if (fastJson && fastJson.data && fastJson.data.list) {
                            fastJson.data.list.forEach(tag => tags.push(tag.hashtag_name));
                        }
                    } catch (e) {
                        console.warn("Fast API blocked, engaging Headless Browser...");
                    }

                    // 战术 B：如果 JSON API 被墙，启动真实的浏览器去“看”那个网页 (速度稍慢，但不可阻挡)
                    if (tags.length === 0) {
                        const tkTargetUrl = 'https://ads.tiktok.com/business/creativecenter/inspiration/popular/hashtag/pc/zh?period=7&region=US';
                        // 开启 render=true，强制服务器等待 JS 加载出数据
                        const hardScraperUrl = `https://api.scraperapi.com?api_key=${SCRAPER_API_KEY}&url=${encodeURIComponent(tkTargetUrl)}&render=true&premium=true`;
                        
                        const hardRes = await fetch(hardScraperUrl, { cache: 'no-store' });
                        if (!hardRes.ok) throw new Error("Headless browser failed");
                        raw = await hardRes.text();
                        
                        // 把渲染完毕的 HTML 变成纯文本
                        const docTk = parser.parseFromString(raw, "text/html");
                        const pageText = docTk.body ? docTk.body.textContent : raw;
                        
                        // 用正则匹配视觉上显示的 "# olympics" 或 "#hockey"
                        const visualRegex = /#\s*([a-zA-Z0-9_]+)/g;
                        let match;
                        while ((match = visualRegex.exec(pageText)) !== null) {
                            let tagStr = match[1].toLowerCase();
                            if(!tags.includes(tagStr) && tagStr.length > 1) {
                                tags.push(tagStr);
                            }
                        }
                    }

                    if (tags.length === 0) {
                        throw new Error("WAF Blocked or Timeout");
                    }

                    // 组装结果
                    tags.slice(0, 15).forEach(tag => {
                        items.push({ 
                            title: '#' + tag, 
                            link: `https://www.tiktok.com/tag/${encodeURIComponent(tag)}` 
                        });
                    });
                    break;
            }
            
            if(items.length === 0) throw new Error("Parsed empty array");
            return items;
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            // 如果是 TikTok，给一个较长的等待提示，因为真实浏览器渲染需要几秒钟
            const loadingText = platform.id === 'tiktok' ? `Bypassing_WAF_${platform.name}...` : `Fetching_${platform.name}...`;
            container.innerHTML += `<div id="card-${index}" class="h-[500px] bg-slate-900/50 border-2 border-slate-800 rounded-lg flex items-center justify-center"><span class="text-[9px] animate-pulse uppercase text-emerald-700 font-bold tracking-widest">${loadingText}</span></div>`;

            try {
                const items = await getRealTimeData(platform.id);
                let html = `
                    <div class="h-[500px] bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-3 bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-800">
                            <span class="font-black text-[10px] uppercase text-white tracking-widest">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block tracking-tight font-sans text-slate-300 transition-colors"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                console.error(`Error on ${platform.id}:`, err);
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-slate-900 game-border"><span class="text-red-500 font-bold text-[10px] uppercase italic tracking-widest">[FIREWALL BLOCK]</span><p class="text-[9px] text-slate-600 mt-2 font-mono">Target WAF block / Endpoint dead.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); 
            }
        }
        init();
    </script>
</body>
</html>
