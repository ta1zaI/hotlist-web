<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Matrix // NEXT.JS HIJACK EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1400px] mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Omni-Matrix 4</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase font-bold tracking-widest">
                    <span class="animate-blink text-red-500">● LIVE</span> // STATE HIJACK ENGINE ENABLED
                </p>
            </div>
            <div class="text-[10px] text-slate-500 italic mt-4 md:mt-0">TIKTOK WAF BYPASS: NEXT.JS EXTRACTION</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="board-container"></div>
    </div>

    <script>
        const MY_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';
        // 你的真实 API 密钥
        const SCRAPER_API_KEY = '55cc9fdf6a593f6134c563837a4ace68'; 

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', color: 'border-orange-500' },
            { id: 'twitter', name: 'X Trend (US)', color: 'border-slate-100' },
            { id: 'imdb', name: 'IMDb Popular', color: 'border-yellow-500' },
            { id: 'tiktok', name: 'TikTok Trend (US)', color: 'border-pink-500' }
        ];

        async function fetchRawData(url) {
            const response = await fetch(MY_PROXY + encodeURIComponent(url), { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }

        async function getRealTimeData(platformId) {
            let items = [];
            let raw = '';
            const parser = new DOMParser();

            switch (platformId) {
                // ==========================================
                // 【稳如磐石区】：绝对不动
                // ==========================================
                case 'reddit':
                    raw = await fetchRawData('https://www.reddit.com/r/all/hot.json?limit=15');
                    JSON.parse(raw).data.children.slice(0, 15).forEach(c => {
                        items.push({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` });
                    });
                    break;

                case 'twitter':
                    raw = await fetchRawData('https://trends24.in/united-states/');
                    const docTwitter = parser.parseFromString(raw, "text/html");
                    const tNodes = docTwitter.querySelectorAll('.trend-card__list li a');
                    for(let i=0; i<Math.min(tNodes.length, 15); i++) {
                        items.push({ title: tNodes[i].textContent.trim(), link: tNodes[i].href });
                    }
                    break;

                case 'imdb':
                    raw = await fetchRawData('https://api.themoviedb.org/3/trending/movie/day?api_key=15d2ea6d0dc1d476efbca3eba2b9bbfb');
                    JSON.parse(raw).results.slice(0, 15).forEach(m => {
                        items.push({ title: m.title, link: `https://www.themoviedb.org/movie/${m.id}` });
                    });
                    break;

                // ==========================================
                // 【外科手术区】：TikTok 底层状态劫持
                // ==========================================
                case 'tiktok':
                    let tags = [];
                    
                    // 目标锁定：官方网页 (注意：换成 en 语言路径，降低 TikTok 服务器对地域冲突的拦截概率，但数据依然是美国的)
                    const tkTargetUrl = 'https://ads.tiktok.com/business/creativecenter/inspiration/popular/hashtag/pc/en?domain=country&countryCode=US&period=7';
                    
                    // 【关键改变】：去掉了 render=true。只获取最原始的 HTML，速度极快，WAF 根本反应不过来
                    const fastScraperUrl = `https://api.scraperapi.com?api_key=${SCRAPER_API_KEY}&url=${encodeURIComponent(tkTargetUrl)}&country_code=us`;
                    
                    try {
                        const res = await fetch(fastScraperUrl, { cache: 'no-store' });
                        if (!res.ok) throw new Error("ScraperAPI rejected");
                        raw = await res.text();
                        
                        // 核心劫持：直接找 Next.js 注入的底层数据块
                        const nextDataMatch = raw.match(/<script id="__NEXT_DATA__" type="application\/json">([\s\S]*?)<\/script>/);
                        
                        if (nextDataMatch) {
                            const nextDataStr = nextDataMatch[1];
                            // 在这个巨大的 JSON 字符串里，无视结构，暴力猎杀所有 hashtag
                            const hashtagRegex = /"hashtag_name":"([^"]+)"/g;
                            let match;
                            while ((match = hashtagRegex.exec(nextDataStr)) !== null) {
                                let tagStr = match[1];
                                if (!tags.includes(tagStr) && tagStr.length > 1) {
                                    tags.push(tagStr);
                                }
                            }
                        }
                    } catch (e) {
                        console.warn("HTML hijack failed, trying raw API...");
                    }

                    // 备用方案：用 ScraperAPI 直接打底层接口
                    if (tags.length === 0) {
                        const tkApiUrl = 'https://ads.tiktok.com/creative_radar_api/v1/popular_trend/hashtag/list?period=7&page=1&limit=20&country_code=US';
                        const apiScraperUrl = `https://api.scraperapi.com?api_key=${SCRAPER_API_KEY}&url=${encodeURIComponent(tkApiUrl)}&country_code=us`;
                        const apiRes = await fetch(apiScraperUrl);
                        const apiJson = await apiRes.json();
                        if (apiJson && apiJson.data && apiJson.data.list) {
                            apiJson.data.list.forEach(item => {
                                if (!tags.includes(item.hashtag_name)) tags.push(item.hashtag_name);
                            });
                        }
                    }

                    if (tags.length === 0) {
                        throw new Error("Target Structure Mutated / Extraction Failed");
                    }

                    // 组装结果，取前 15 个最热话题
                    tags.slice(0, 15).forEach(tag => {
                        items.push({ 
                            title: '#' + tag, 
                            link: `https://www.tiktok.com/tag/${encodeURIComponent(tag)}` 
                        });
                    });
                    break;
            }
            
            if(items.length === 0) throw new Error("Parsed empty array");
            return items;
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[500px] bg-slate-900/50 border-2 border-slate-800 rounded-lg flex items-center justify-center"><span class="text-[9px] animate-pulse uppercase text-emerald-700 font-bold tracking-widest">Hijacking_${platform.name}...</span></div>`;

            try {
                const items = await getRealTimeData(platform.id);
                let html = `
                    <div class="h-[500px] bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-3 bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-800">
                            <span class="font-black text-[10px] uppercase text-white tracking-widest">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block tracking-tight font-sans text-slate-300 transition-colors"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                console.error(`Error on ${platform.id}:`, err);
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-slate-900 game-border"><span class="text-red-500 font-bold text-[10px] uppercase italic tracking-widest">[EXTRACTION FAILED]</span><p class="text-[9px] text-slate-600 mt-2 font-mono">Anti-Bot Triggered.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 400)); 
            }
        }
        init();
    </script>
</body>
</html>
