<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 5 Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 0px; }
        body { background-color: #f4f4f0; background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px; }
        
        /* 潮酷硬核 UI 风格 */
        .neo-brutal {
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.2s ease;
        }
        .neo-brutal:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px #000;
        }
        .neo-title {
            text-shadow: 3px 3px 0px #000;
        }
    </style>
</head>
<body class="p-4 md:p-8 font-sans text-black">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-12 flex flex-col md:flex-row justify-between items-end border-b-4 border-black pb-4">
            <div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase italic text-white neo-title" style="-webkit-text-stroke: 2px black;">GLOBAL HOT 5</h1>
                <p class="text-sm font-bold mt-2 uppercase tracking-widest bg-yellow-300 inline-block px-2 border-2 border-black">Tracker Node: Billowing-Salad</p>
            </div>
            <div class="text-xs font-bold mt-4 md:mt-0 px-3 py-1 bg-white border-2 border-black">STATUS: 100% SECURE</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 你的万能 CF 代理
        const PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        // 采用永不 404 的大厂追踪源
        const platforms = [
            { id: 'reddit', name: 'Reddit', type: 'json', url: 'https://www.reddit.com/r/all/hot.json', bg: 'bg-[#ff4500]', text: 'text-white' },
            { id: 'youtube', name: 'YouTube', type: 'rss', url: 'https://news.google.com/rss/search?q=YouTube+Trending+Videos&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#ff0000]', text: 'text-white' },
            { id: 'imdb', name: 'IMDb', type: 'rss', url: 'https://news.google.com/rss/search?q=IMDb+Top+Movies&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#f5c518]', text: 'text-black' },
            { id: 'twitter', name: 'X / Twitter', type: 'rss', url: 'https://news.google.com/rss/search?q=Twitter+Trending+Topics&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#1da1f2]', text: 'text-white' },
            { id: 'tiktok', name: 'TikTok', type: 'rss', url: 'https://news.google.com/rss/search?q=TikTok+Trending+Challenges&hl=en-US&gl=US&ceid=US:en', bg: 'bg-[#00f2fe]', text: 'text-black' }
        ];

        async function fetchAPI(platform) {
            const response = await fetch(PROXY + encodeURIComponent(platform.url));
            if (!response.ok) throw new Error('Network Error');

            if (platform.type === 'json') {
                const data = await response.json();
                return data.data.children.map(c => ({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` }));
            } else {
                const text = await response.text();
                const doc = new DOMParser().parseFromString(text, "text/xml");
                const nodes = doc.querySelectorAll("item");
                let items = [];
                nodes.forEach((n, i) => { 
                    if(i < 15) {
                        // 清理掉 Google News 自带的后缀
                        let cleanTitle = n.querySelector("title")?.textContent.replace(/ - [^-]+$/, '') || 'No Title';
                        items.push({ title: cleanTitle, link: n.querySelector("link")?.textContent });
                    }
                });
                return items;
            }
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[550px] bg-white neo-brutal flex items-center justify-center"><span class="font-bold uppercase animate-pulse">Loading ${platform.name}...</span></div>`;

            try {
                const items = await fetchAPI(platform);
                let html = `
                    <div class="h-[550px] bg-white neo-brutal flex flex-col overflow-hidden">
                        <div class="p-4 ${platform.bg} border-b-4 border-black flex justify-between items-center">
                            <span class="font-black text-xl uppercase ${platform.text} tracking-tight">${platform.name}</span>
                        </div>
                        <ul class="p-4 space-y-3 overflow-y-auto flex-1 custom-scrollbar bg-white">
                `;
                items.forEach(item => {
                    html += `<li class="border-b-2 border-gray-200 pb-2 last:border-0 hover:translate-x-1 transition-transform"><a href="${item.link}" target="_blank" class="text-sm font-bold text-gray-800 hover:text-black block leading-snug"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-white neo-brutal"><span class="text-red-500 font-black text-2xl uppercase">ERROR</span><p class="text-sm font-bold mt-2">Data feed blocked.</p></div>`;
            }
        }

        async function init() {
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 200)); 
            }
        }
        init();
    </script>
</body>
</html>
