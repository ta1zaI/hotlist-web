<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网极速聚合热榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl md:text-4xl font-extrabold text-center text-gray-800 mb-8">🔥 全网极速热榜</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="board-container">
            <div id="loading" class="col-span-full text-center text-gray-500 font-bold text-xl py-10">
                正在直连官方数据源，拒绝一切中间商赚差价...
            </div>
        </div>
    </div>

    <script>
        // 这里的路由直接对应你 vercel.json 里的配置
        const platforms = [
            { id: 'weibo', name: '微博热搜', url: '/api/weibo', color: 'bg-red-50 text-red-600 border-red-200' },
            { id: 'bili', name: 'B站热榜', url: '/api/bili', color: 'bg-blue-50 text-blue-600 border-blue-200' },
            { id: 'zhihu', name: '知乎热榜', url: '/api/zhihu', color: 'bg-blue-50 text-blue-800 border-blue-200' },
            { id: 'baidu', name: '百度热搜', url: '/api/baidu', color: 'bg-blue-50 text-blue-800 border-blue-200' }
        ];

        async function fetchAPI(platform) {
            try {
                const response = await fetch(platform.url);
                if (!response.ok) throw new Error(`HTTP 错误: ${response.status}`);
                const json = await response.json();
                
                let items = [];
                
                // 针对不同官方 API 的专属“翻译器”
                if (platform.id === 'weibo') {
                    // 微博可能存在置顶热搜，这里取实时热搜列表
                    const list = json.data.realtime || [];
                    items = list.map(item => ({
                        title: item.word,
                        link: `https://s.weibo.com/weibo?q=%23${encodeURIComponent(item.word)}%23`
                    }));
                } 
                else if (platform.id === 'bili') {
                    const list = json.data.list || [];
                    items = list.map(item => ({
                        title: item.title,
                        link: item.short_link_v2 || `https://www.bilibili.com/video/${item.bvid}`
                    }));
                } 
                else if (platform.id === 'zhihu') {
                    const list = json.data || [];
                    items = list.map(item => {
                        // 区分知乎的问题和专栏文章
                        let link = `https://www.zhihu.com/question/${item.target.id}`;
                        if (item.target.type === 'article') link = `https://zhuanlan.zhihu.com/p/${item.target.id}`;
                        return { title: item.target.title, link: link };
                    });
                } 
                else if (platform.id === 'baidu') {
                    const list = json.data.cards[0].content || [];
                    items = list.map(item => ({
                        title: item.word,
                        link: item.rawUrl
                    }));
                }

                if (items.length === 0) throw new Error('未提取到数据');

                let html = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[500px]">
                        <h2 class="text-lg font-bold p-4 border-b ${platform.color}">${platform.name}</h2>
                        <ul class="p-4 space-y-3 overflow-y-auto flex-1">
                `;

                for (let i = 0; i < Math.min(items.length, 15); i++) {
                    html += `
                        <li class="flex items-start border-b border-gray-50 pb-2 last:border-0">
                            <span class="font-bold text-gray-400 w-6 shrink-0">${i+1}.</span>
                            <a href="${items[i].link}" target="_blank" class="text-gray-700 hover:text-blue-600 hover:underline transition-colors line-clamp-2 text-sm leading-tight flex-1">
                                ${items[i].title}
                            </a>
                        </li>
                    `;
                }
                html += `</ul></div>`;
                return html;
            } catch (error) {
                console.error(`${platform.name} 抓取失败:`, error);
                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 h-[500px] flex flex-col items-center justify-center">
                        <span class="text-red-400 font-bold text-center mb-2">🚫 ${platform.name}</span>
                        <span class="text-gray-500 text-sm">官方反爬拦截或暂无数据</span>
                    </div>
                `;
            }
        }

        async function init() {
            const container = document.getElementById('board-container');
            const loading = document.getElementById('loading');
            
            let finalHtml = '';
            const promises = platforms.map(p => fetchAPI(p));
            const results = await Promise.all(promises);
            
            loading.style.display = 'none';
            results.forEach(html => { finalHtml += html; });
            container.innerHTML = finalHtml;
        }

        init();
    </script>
</body>
</html>
