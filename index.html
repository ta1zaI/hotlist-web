<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Intel Matrix // DIRECT SCRAPE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .game-border { border: 2px solid #1e293b; box-shadow: 4px 4px 0px #0f172a; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .animate-blink { animation: blink 1.2s infinite; }
    </style>
</head>
<body class="bg-[#0f172a] p-4 md:p-8 font-mono text-slate-300">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-end border-b-2 border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">Global 5 Hotlist</h1>
                <p class="text-[10px] text-emerald-500 mt-1 uppercase font-bold tracking-widest">
                    <span class="animate-blink text-red-500">● LIVE</span> // DOM SCRAPING ENGINE V6
                </p>
            </div>
            <div class="text-[10px] text-slate-500 italic mt-4 md:mt-0">PROXY: BILLOWING-SALAD (ACTIVE)</div>
        </header>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6" id="board-container"></div>
    </div>

    <script>
        // 核心：只用你自己的专属代理，绝对不套娃！
        const MY_PROXY = 'https://billowing-salad-1c9b.lyr124423132.workers.dev/?url=';

        const platforms = [
            { id: 'reddit', name: 'Reddit /r/all', color: 'border-orange-500' },
            { id: 'youtube', name: 'YouTube Trend (US)', color: 'border-red-600' },
            { id: 'imdb', name: 'IMDb Popular', color: 'border-yellow-500' },
            { id: 'twitter', name: 'X Trend (US)', color: 'border-slate-100' },
            { id: 'tiktok', name: 'TikTok Trend', color: 'border-pink-500' }
        ];

        // 基础抓取函数：可选择是否带时间戳防止 404
        async function fetchRawData(url, useTimestamp = true) {
            let targetUrl = url;
            if (useTimestamp) {
                targetUrl += (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
            }
            // 加上 cache: 'no-store' 强行要求浏览器不使用缓存
            const response = await fetch(MY_PROXY + encodeURIComponent(targetUrl), { cache: 'no-store' });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        }

        async function getRealTimeData(platformId) {
            let items = [];
            let raw = '';
            const parser = new DOMParser();

            switch (platformId) {
                case 'reddit':
                    // Reddit 官方实时 JSON
                    raw = await fetchRawData('https://www.reddit.com/r/all/hot.json?limit=15', true);
                    JSON.parse(raw).data.children.slice(0, 15).forEach(c => {
                        items.push({ title: c.data.title, link: `https://reddit.com${c.data.permalink}` });
                    });
                    break;

                case 'youtube':
                    // YouTube 原生 JSON 接口 (坚决不加时间戳，防止报 404)
                    raw = await fetchRawData('https://yt.lemnoslife.com/trending', false);
                    JSON.parse(raw).items.slice(0, 15).forEach(v => {
                        items.push({ title: v.snippet.title, link: `https://www.youtube.com/watch?v=${v.id}` });
                    });
                    break;

                case 'twitter':
                    // 扒取北美实时推特热搜榜网页
                    raw = await fetchRawData('https://trends24.in/united-states/', true);
                    const docTwitter = parser.parseFromString(raw, "text/html");
                    const tNodes = docTwitter.querySelectorAll('.trend-card__list li a');
                    for(let i=0; i<Math.min(tNodes.length, 15); i++) {
                        items.push({ title: tNodes[i].textContent.trim(), link: tNodes[i].href });
                    }
                    break;

                case 'tiktok':
                    // 你指定的 TikTok 商业创意中心 (中文页)
                    raw = await fetchRawData('https://ads.tiktok.com/business/creativecenter/inspiration/popular/hashtag/pc/zh', true);
                    
                    let tags = [];
                    // 多重正则暴力解构：防止 TikTok 更改 JSON 字段名
                    const regexList = [
                        /"hashtag_name":"([^"]+)"/g, 
                        /"keyword":"([^"]+)"/g, 
                        /"trend_name":"([^"]+)"/g
                    ];
                    
                    for (let regex of regexList) {
                        let match;
                        while ((match = regex.exec(raw)) !== null && tags.length < 15) {
                            if(!tags.includes(match[1]) && match[1].length > 1) {
                                tags.push(match[1]);
                            }
                        }
                        if (tags.length > 0) break; // 只要有一种正则匹配成功，就停止
                    }

                    if(tags.length === 0) throw new Error("DOM Structure Changed or Blocked");

                    // 组装成必能打开的官方话题链接
                    tags.forEach(tag => {
                        items.push({ 
                            title: '#' + tag, 
                            link: `https://www.tiktok.com/tag/${encodeURIComponent(tag)}` 
                        });
                    });
                    break;

                case 'imdb':
                    // 直接扒取基于 IMDb 的北美影迷热榜网页 Trakt
                    raw = await fetchRawData('https://trakt.tv/movies/trending', true);
                    const docImdb = parser.parseFromString(raw, "text/html");
                    const mNodes = docImdb.querySelectorAll('.grid-item .titles h3 a');
                    for(let i=0; i<Math.min(mNodes.length, 15); i++) {
                        items.push({ title: mNodes[i].textContent.trim(), link: `https://trakt.tv${mNodes[i].getAttribute('href')}` });
                    }
                    break;
            }
            
            if(items.length === 0) throw new Error("Empty Data Parsed");
            return items;
        }

        async function loadCard(platform, index) {
            const container = document.getElementById('board-container');
            container.innerHTML += `<div id="card-${index}" class="h-[500px] bg-slate-900/50 border-2 border-slate-800 rounded-lg flex items-center justify-center"><span class="text-[9px] animate-pulse uppercase text-emerald-700 font-bold tracking-widest">Scraping_Live_${platform.name}...</span></div>`;

            try {
                const items = await getRealTimeData(platform.id);
                let html = `
                    <div class="h-[500px] bg-slate-900 game-border ${platform.color} rounded-lg flex flex-col overflow-hidden transition-all hover:translate-y-[-4px]">
                        <div class="p-3 bg-slate-800/80 flex justify-between items-center border-b-2 border-slate-800">
                            <span class="font-black text-[10px] uppercase text-white tracking-widest">${platform.name}</span>
                            <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_5px_#10b981] animate-blink"></div>
                        </div>
                        <ul class="p-3 space-y-3 overflow-y-auto flex-1 custom-scrollbar">
                `;
                items.forEach(item => {
                    html += `<li class="border-b border-slate-800/50 pb-2 last:border-0"><a href="${item.link}" target="_blank" class="text-[11px] leading-relaxed hover:text-emerald-400 block tracking-tight font-sans text-slate-300 transition-colors"> > ${item.title}</a></li>`;
                });
                document.getElementById(`card-${index}`).outerHTML = html + `</ul></div>`;
            } catch (err) {
                console.error(`Error on ${platform.id}:`, err);
                document.getElementById(`card-${index}`).innerHTML = `<div class="p-6 text-center h-full flex flex-col items-center justify-center bg-slate-900 game-border"><span class="text-red-500 font-bold text-[10px] uppercase italic tracking-widest">[SCRAPE FAILED]</span><p class="text-[9px] text-slate-600 mt-2">Source layout mutated or access denied.</p></div>`;
            }
        }

        async function init() {
            // 一个接一个地请求，防止你的 CF 代理瞬间并发过高触发目标站的防火墙
            for (let i = 0; i < platforms.length; i++) {
                await loadCard(platforms[i], i);
                await new Promise(r => setTimeout(r, 500)); 
            }
        }
        init();
    </script>
</body>
</html>
